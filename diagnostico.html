<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Ley 21.719 | ShellTI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   RESET & ROOT
══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --deep:    #020617;
  --deep2:   #040d1e;
  --deep3:   #060f1c;
  --cyan:    #00D4FF;
  --cyan2:   #00b8e6;
  --cyan3:   #7eeeff;
  --green:   #34D399;
  --green2:  #22c587;
  --red:     #FF6B6B;
  --red2:    #FF5252;
  --yellow:  #FFD93D;
  --yellow2: #FFC107;
  --silver:  #E2E8F0;
  --muted:   #94A3B8;
  --border:  rgba(0,212,255,0.13);
  --bh:      rgba(0,212,255,0.32);
  --card:    rgba(3,9,24,0.93);
  --cg:      rgba(0,212,255,0.07);
}
html{scroll-behavior:smooth}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--deep)}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.4);border-radius:2px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--deep);color:var(--silver);line-height:1.7;overflow-x:hidden}
h1,h2,h3,h4,h5{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;color:var(--silver);line-height:1.1}

/* ══════════════════════════════════════════════
   NAVBAR
══════════════════════════════════════════════ */
nav{
  position:fixed;top:0;width:100%;z-index:300;
  height:68px;padding:0 2.5rem;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(2,6,23,0.95);
  backdrop-filter:blur(28px) saturate(200%);
  border-bottom:1px solid var(--border);
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-brand-name{font-weight:800;font-size:1.15rem;color:var(--silver);letter-spacing:-.5px;line-height:1}
.nav-brand-name span{color:var(--cyan)}

/* ══════════════════════════════════════════════
   MAIN CONTAINER
══════════════════════════════════════════════ */
main{min-height:100vh;padding:100px 2.5rem 60px;position:relative;overflow:hidden}
.main-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 1100px 900px at 80% 15%, rgba(0,212,255,0.075) 0%,transparent 60%),
    radial-gradient(ellipse 700px 600px at 5%  85%, rgba(52,211,153,0.055) 0%,transparent 60%),
    var(--deep);
}
.grid-lines{
  position:absolute;inset:0;opacity:.028;
  background-image:linear-gradient(var(--cyan) 1px,transparent 1px),linear-gradient(90deg,var(--cyan) 1px,transparent 1px);
  background-size:55px 55px;pointer-events:none;
}
.container{max-width:1100px;margin:0 auto;width:100%;position:relative;z-index:1}

/* ══════════════════════════════════════════════
   SURVEY SECTION
══════════════════════════════════════════════ */
.survey-wrapper{display:grid;grid-template-columns:1fr 400px;gap:40px;margin-bottom:3rem}
.survey-questions{display:flex;flex-direction:column;gap:1rem}
.question-item{
  background:var(--card);border:1px solid var(--border);border-radius:3px;
  padding:1rem 1.5rem;box-shadow:0 0 32px rgba(0,212,255,0.06);
  display:flex;justify-content:space-between;align-items:center;gap:20px;
  transition:all .3s ease;
}
.question-content{flex:1}
.question-num{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);text-transform:uppercase;margin-bottom:.2rem}
.question-text{font-size:.9rem;color:var(--silver);font-weight:500;line-height:1.4}
.answer-buttons{display:flex;gap:8px;flex-shrink:0}
.btn-answer{
  padding:8px 16px;border:1px solid rgba(226,232,240,.15);
  background:transparent;color:var(--muted);
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.75rem;
  border-radius:2px;cursor:pointer;transition:all .2s;min-width:60px;
}
.btn-answer.active.yes{background:var(--green);color:var(--deep);border-color:var(--green)}
.btn-answer.active.no{background:var(--red);color:var(--silver);border-color:var(--red)}

/* ══════════════════════════════════════════════
   HEATMAP SECTION
══════════════════════════════════════════════ */
.heatmap-panel{
  background:var(--card);border:1px solid var(--border);border-radius:3px;
  padding:2rem;position:sticky;top:100px;height:fit-content;
}
.matrix-wrapper{
  position:relative;width:100%;aspect-ratio:1/1;
  background:var(--deep);border:1px solid var(--border);
  display:grid;grid-template-columns:repeat(2, 1fr);grid-template-rows:repeat(2, 1fr);
}
.quadrant{display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;text-transform:uppercase}
.quad-tl{background:rgba(255,107,107,0.25);color:var(--red)} /* CRÍTICO */
.quad-tr{background:rgba(255,107,107,0.15);color:var(--red)} /* ALTO */
.quad-bl{background:rgba(255,217,61,0.15);color:var(--yellow)} /* MEDIO */
.quad-br{background:rgba(52,211,153,0.15);color:var(--green)} /* BAJO */

.risk-pointer{
  position:absolute;width:16px;height:16px;background:var(--cyan);
  border-radius:50%;border:2px solid var(--silver);
  box-shadow:0 0 15px var(--cyan);
  transform:translate(-50%, -50%);
  transition:all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  left:75%;top:75%; /* Inicia en BAJO */
}

/* ══════════════════════════════════════════════
   RESULTS
══════════════════════════════════════════════ */
.results-section{background:var(--card);border:1px solid var(--border);padding:2rem;margin-top:2rem;display:none}
.results-section.show{display:block}
.results-main{font-size:1.5rem;font-weight:800;margin-bottom:1rem}
.critical-text{color:var(--red)}
.high-text{color:var(--yellow)}
.medium-text{color:var(--yellow)}
.low-text{color:var(--green)}

.modal-overlay{
  position:fixed;inset:0;background:rgba(2,6,23,0.95);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;z-index:9999;
  opacity:0;visibility:hidden;transition:all .3s;
}
.modal-overlay.active{opacity:1;visibility:visible}
.modal-content{background:var(--deep2);border:1px solid var(--border);padding:3rem;max-width:500px;width:90%;border-radius:4px}

</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-brand-name">Shell<span>TI</span></span>
  </a>
</nav>

<main>
  <div class="main-bg"></div>
  <div class="grid-lines"></div>
  <div class="container">
    <div class="diag-header" style="text-align:center; margin-bottom:3rem">
      <h1 style="font-size:2.5rem">Diagnóstico de <span style="color:var(--cyan)">Cumplimiento</span></h1>
      <p style="color:var(--muted)">Evaluación rápida de postura frente a la Ley 21.719</p>
    </div>

    <div class="survey-wrapper">
      <div class="survey-questions" id="questionsContainer">
        <!-- Preguntas generadas por JS -->
      </div>

      <div class="heatmap-panel">
        <p style="font-family:'JetBrains Mono'; font-size:.7rem; color:var(--cyan); margin-bottom:1rem">MATRIZ DE RIESGO DINÁMICA</p>
        <div class="matrix-wrapper">
          <div class="quadrant quad-tl">Crítico</div>
          <div class="quadrant quad-tr">Alto</div>
          <div class="quadrant quad-bl">Medio</div>
          <div class="quadrant quad-br">Bajo</div>
          <div class="risk-pointer" id="riskPointer"></div>
        </div>
        
        <div id="statusBox" style="margin-top:1.5rem; padding:1rem; border-left:3px solid var(--green); background:rgba(52,211,153,0.05)">
          <p id="statusText" style="font-size:.85rem; font-weight:600">Estado: <span style="color:var(--green)">Pendiente</span></p>
        </div>
      </div>
    </div>

    <div class="results-section" id="resultsSection">
      <h2 class="results-main" id="resultsLevel">Nivel de Riesgo: --</h2>
      <p id="resultsDesc" style="color:var(--muted); margin-bottom:2rem"></p>
      <button class="btn-submit" style="width:100%; padding:15px; background:var(--cyan); border:none; color:var(--deep); font-weight:800; cursor:pointer" onclick="openModal()">AGENDAR CONSULTA PERSONALIZADA →</button>
    </div>
  </div>
</main>

<div class="modal-overlay" id="contactModal">
  <div class="modal-content">
    <h3 style="margin-bottom:1rem">Agendar Consulta</h3>
    <form action="https://formsubmit.co/contacto@shellti.com" method="POST" style="display:flex; flex-direction:column; gap:12px">
      <input type="hidden" name="_subject" value="Nuevo Lead - Diagnóstico ShellTI">
      <input type="hidden" name="riesgo_detectado" id="hiddenRiesgo">
      <input style="padding:12px; background:var(--deep); border:1px solid var(--border); color:white" type="text" name="nombre" placeholder="Nombre" required>
      <input style="padding:12px; background:var(--deep); border:1px solid var(--border); color:white" type="email" name="email" placeholder="Email Corporativo" required>
      <input style="padding:12px; background:var(--deep); border:1px solid var(--border); color:white" type="text" name="empresa" placeholder="Empresa">
      <button type="submit" style="padding:15px; background:var(--cyan); border:none; color:var(--deep); font-weight:800; cursor:pointer">ENVIAR SOLICITUD</button>
      <button type="button" onclick="closeModal()" style="background:none; border:none; color:var(--muted); cursor:pointer">Cerrar</button>
    </form>
  </div>
</div>

<script>
const questions = [
  { id: 1, text: "¿Cuenta con un inventario actualizado de activos de información y datos personales?" },
  { id: 2, text: "¿Posee mecanismos de consentimiento explícito para el tratamiento de datos?" },
  { id: 3, text: "¿Se realizan evaluaciones de impacto de protección de datos (DPIA) regularmente?" },
  { id: 4, text: "¿Existen políticas de retención y eliminación de datos claramente definidas?" },
  { id: 5, text: "¿Tiene un protocolo de notificación de brechas de seguridad (72 horas)?" },
  { id: 6, text: "¿Los contratos con terceros incluyen cláusulas de protección de datos actualizadas?" },
  { id: 7, text: "¿Utiliza autenticación de doble factor (MFA) para accesos a datos sensibles?" }
];

let answers = {};

function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = questions.map(q => `
    <div class="question-item" id="q-${q.id}">
      <div class="question-content">
        <div class="question-num">Control 0${q.id}</div>
        <div class="question-text">${q.text}</div>
      </div>
      <div class="answer-buttons">
        <button class="btn-answer yes" onclick="setAnswer(${q.id}, 'yes')">SÍ</button>
        <button class="btn-answer no" onclick="setAnswer(${q.id}, 'no')">NO</button>
      </div>
    </div>
  `).join('');
}

function setAnswer(id, val) {
  answers[id] = val;
  const item = document.getElementById(`q-${id}`);
  item.querySelectorAll('.btn-answer').forEach(b => b.classList.remove('active'));
  item.querySelector(`.${val}`).classList.add('active');
  updateRisk();
}

function updateRisk() {
  const noCount = Object.values(answers).filter(v => v === 'no').length;
  const totalAnswered = Object.keys(answers).length;
  const pointer = document.getElementById('riskPointer');
  const statusBox = document.getElementById('statusBox');
  const statusText = document.getElementById('statusText');
  
  let level = "Bajo";
  let color = "var(--green)";
  let posX = "75%", posY = "75%";

  if (noCount >= 3) {
    level = "Crítico";
    color = "var(--red)";
    posX = "25%"; posY = "25%";
  } else if (noCount === 2) {
    level = "Alto";
    color = "var(--yellow)";
    posX = "75%"; posY = "25%";
  } else if (noCount === 1) {
    level = "Medio";
    color = "var(--yellow)";
    posX = "25%"; posY = "75%";
  }

  pointer.style.left = posX;
  pointer.style.top = posY;
  statusBox.style.borderColor = color;
  statusText.innerHTML = `Estado: <span style="color:${color}">${level}</span>`;

  if (totalAnswered === questions.length) {
    showResults(level, noCount);
  }
}

function showResults(level, count) {
  const section = document.getElementById('resultsSection');
  const title = document.getElementById('resultsLevel');
  const desc = document.getElementById('resultsDesc');
  document.getElementById('hiddenRiesgo').value = level;

  section.classList.add('show');
  title.className = `results-main ${level.toLowerCase()}-text`;
  title.innerText = `Nivel de Riesgo: ${level}`;
  
  if (level === "Crítico") {
    desc.innerText = "Se han detectado múltiples brechas críticas de cumplimiento. Su organización requiere una intervención inmediata para mitigar riesgos legales y operativos bajo la Ley 21.719.";
  } else if (level === "Alto") {
    desc.innerText = "Existen debilidades importantes en los controles de protección de datos. Se recomienda priorizar la regularización de los puntos marcados como negativos.";
  } else {
    desc.innerText = "Su postura de cumplimiento es aceptable, sin embargo, existen oportunidades de mejora para alcanzar un estándar de seguridad total.";
  }
}

function openModal() { document.getElementById('contactModal').classList.add('active'); }
function closeModal() { document.getElementById('contactModal').classList.remove('active'); }

renderQuestions();
</script>

</body>
</html>
