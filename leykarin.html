<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agente Ley Karin — ShellTI</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/imagenes/webp/lobo_shellti.webp" type="image/webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0d1b2e;--surface:#080f1e;--surface2:#0b1425;
      --border:#162032;--border2:#1e2d45;
      --cyan:#00D4FF;--cyan-dim:rgba(0,212,255,.1);--cyan-gl:rgba(0,212,255,.05);
      --emerald:#34D399;--amber:#FBBF24;--red:#F87171;
      --text:#e2e8f0;--text2:#94a3b8;--muted:#475569;
      --sans:"Plus Jakarta Sans",sans-serif;--mono:"JetBrains Mono",monospace;
      --r:8px;--nav-h:60px;--sb-w:252px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(2,6,23,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
    .nav-brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text);font-weight:700;font-size:.92rem}
    .nav-brand img{height:30px;filter:drop-shadow(0 0 6px var(--cyan))}
    .nav-right{display:flex;align-items:center;gap:10px}
    .nav-pill{display:inline-flex;align-items:center;gap:6px;font-size:.65rem;font-family:var(--mono);color:var(--cyan);border:1px solid rgba(0,212,255,.2);background:var(--cyan-gl);padding:3px 10px;border-radius:20px;letter-spacing:.04em}
    .nav-pill::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

    /* User chip */
    .user-chip{display:none;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px 4px 4px;cursor:default}
    .user-chip.show{display:flex}
    .user-avatar{width:22px;height:22px;border-radius:50%;background:var(--cyan-dim);border:1px solid rgba(0,212,255,.3);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:var(--cyan);flex-shrink:0}
    .user-name{font-size:.65rem;font-weight:600;color:var(--text2);white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
    .user-org{font-size:.58rem;color:var(--muted);white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}

    .eval-trigger{display:flex;align-items:center;gap:7px;background:var(--cyan);border:none;border-radius:var(--r);color:var(--bg);font-size:.74rem;font-family:var(--sans);font-weight:700;padding:8px 16px;cursor:pointer;transition:all .15s;box-shadow:0 0 16px rgba(0,212,255,.25)}
    .eval-trigger:hover{opacity:.88;box-shadow:0 0 24px rgba(0,212,255,.4);transform:translateY(-1px)}

    /* LAYOUT */
    main{flex:1;margin-top:var(--nav-h);display:grid;grid-template-columns:252px 1fr;height:calc(100vh - var(--nav-h));position:relative}

    /* SIDEBAR */
    .sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
    .sidebar::-webkit-scrollbar{width:3px}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border2)}
    .sb-sect{padding:14px 12px 10px;border-bottom:1px solid var(--border)}
    .sb-lbl{font-size:.57rem;font-family:var(--mono);color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
    .qbtn{display:block;width:100%;text-align:left;padding:8px 10px;margin-bottom:4px;background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-family:var(--sans);font-size:.73rem;cursor:pointer;transition:all .14s;line-height:1.35}
    .qbtn:hover{border-color:var(--cyan);color:var(--text);background:var(--cyan-gl)}
    .ql{display:block;font-size:.57rem;font-family:var(--mono);color:var(--muted);margin-bottom:2px;letter-spacing:.06em}

    /* Historial drawer (sobre sidebar) */
    .hist-drawer{position:absolute;top:0;left:0;width:252px;height:100%;background:var(--surface2);border-right:1px solid var(--border2);z-index:50;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
    .hist-drawer.open{transform:translateX(0)}
    .hist-drawer-head{padding:14px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .hist-drawer-head h3{font-size:.82rem;font-weight:700}
    .hist-close{background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--muted);width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .14s;font-size:.8rem}
    .hist-close:hover{border-color:var(--red);color:var(--red)}
    .hist-new-btn{margin:10px 12px 0;padding:8px 10px;background:transparent;border:1px solid rgba(0,212,255,.25);border-radius:var(--r);color:var(--cyan);font-family:var(--sans);font-size:.73rem;font-weight:600;cursor:pointer;transition:all .14s;text-align:left;display:flex;align-items:center;gap:6px}
    .hist-new-btn:hover{background:var(--cyan-gl);border-color:var(--cyan)}
    .hist-list{flex:1;overflow-y:auto;padding:8px 0}
    .hist-list::-webkit-scrollbar{width:3px}
    .hist-list::-webkit-scrollbar-thumb{background:var(--border2)}
    .hist-group-label{font-size:.58rem;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:10px 14px 4px}
    .hist-item{padding:9px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .14s;position:relative}
    .hist-item:hover{background:rgba(255,255,255,.03);border-left-color:var(--border2)}
    .hist-item.active{background:var(--cyan-gl);border-left-color:var(--cyan)}
    .hist-item-title{font-size:.73rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
    .hist-item-meta{font-size:.6rem;color:var(--muted);font-family:var(--mono)}
    .hist-item-del{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:4px;background:transparent;border:none;color:var(--muted);font-size:.65rem;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .14s}
    .hist-item:hover .hist-item-del{display:flex}
    .hist-item-del:hover{background:rgba(248,113,113,.15);color:var(--red)}
    .hist-empty{padding:20px 14px;font-size:.72rem;color:var(--muted);text-align:center;line-height:1.5}

    /* CHAT */
    .chat-wrap{display:block;}
    .chat-head{padding:0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:var(--nav-h);left:var(--sb-w);right:0;z-index:90;background:var(--bg)}

    .chat-head-top{padding:11px 20px;display:flex;align-items:center;justify-content:space-between}
    .chat-head-session{padding:4px 20px 5px;border-top:1px solid var(--border);background:rgba(0,212,255,.03);display:none;align-items:center;justify-content:space-between}
    .chat-head-session.show{display:flex}
    .chat-head-session-title{font-size:.63rem;font-family:var(--mono);color:var(--muted);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px}
    .chat-head-session-date{font-size:.58rem;color:var(--muted);font-family:var(--mono);flex-shrink:0}
    .chat-head-l h1{font-size:.93rem;font-weight:700;margin-bottom:2px}
    .chat-head-l p{font-size:.68rem;color:var(--muted)}
    .chat-head-r{display:flex;align-items:center;gap:5px}
    .ctag{font-size:.58rem;font-family:var(--mono);padding:3px 8px;border-radius:20px;border:1px solid}
    .ctag-c{color:var(--cyan);border-color:rgba(0,212,255,.2);background:var(--cyan-gl)}
    .ctag-g{color:var(--emerald);border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.05)}
    .ctag-a{color:var(--amber);border-color:rgba(251,191,36,.2);background:rgba(251,191,36,.05)}
    .icon-btn{display:flex;align-items:center;gap:4px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);color:var(--muted);font-size:.62rem;font-family:var(--mono);padding:5px 10px;cursor:pointer;transition:all .14s;white-space:nowrap}
    .icon-btn:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-gl)}
    .icon-btn.danger:hover{border-color:rgba(248,113,113,.4);color:var(--red);background:rgba(248,113,113,.05)}

    /* Messages */
    .messages{overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:14px;position:fixed;top:calc(var(--nav-h) + 54px);left:var(--sb-w);right:0;bottom:115px}
    .messages::-webkit-scrollbar{width:3px}
    .messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .msg{display:flex;gap:8px;max-width:800px}
    .msg.user{flex-direction:row-reverse;align-self:flex-end}
    .msg.assistant{align-self:flex-start}
    .msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;flex-shrink:0;margin-top:3px}
    .msg.user .msg-av{background:var(--cyan-dim);color:var(--cyan)}
    .msg.assistant .msg-av{background:rgba(52,211,153,.1);color:var(--emerald)}
    .msg-bubble{padding:10px 14px;border-radius:var(--r);font-size:.82rem;line-height:1.65}
    .msg.user .msg-bubble{background:var(--cyan-dim);border:1px solid rgba(0,212,255,.15)}
    .msg.assistant .msg-bubble{background:var(--surface);border:1px solid var(--border)}
    .msg-bubble strong{color:var(--cyan)}
    .doc-block{margin-top:10px;background:rgba(2,6,23,.8);border:1px solid var(--border2);border-radius:6px;padding:12px;font-family:var(--mono);font-size:.71rem;white-space:pre-wrap;color:#94a3b8;position:relative}
    .doc-copy{position:absolute;top:7px;right:7px;background:var(--border2);border:none;color:var(--muted);font-size:.58rem;padding:3px 7px;border-radius:3px;cursor:pointer;font-family:var(--mono);transition:all .14s}
    .doc-copy:hover{background:var(--cyan-dim);color:var(--cyan)}
    .typing-dots{display:flex;gap:4px;padding:4px 0}
    .typing-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tdot 1.2s infinite}
    .typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
    @keyframes tdot{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

    /* Session title */
    .session-banner{padding:6px 20px;background:rgba(0,212,255,.03);border-bottom:1px solid var(--border);display:none;align-items:center;justify-content:space-between;flex-shrink:0}
    .session-banner.show{display:flex}
    .session-banner-title{font-size:.65rem;font-family:var(--mono);color:var(--muted);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px}
    .session-banner-date{font-size:.6rem;color:var(--muted);font-family:var(--mono);flex-shrink:0}

    /* Welcome */
    .welcome{max-width:520px;width:100%;margin:auto;text-align:center;padding:32px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .welcome-icon{width:52px;height:52px;border-radius:14px;background:var(--cyan-dim);border:1px solid rgba(0,212,255,.2);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px}
    .welcome h2{font-size:1.15rem;font-weight:700;margin-bottom:8px;color:var(--text)}
    .welcome p{font-size:.82rem;color:var(--muted);line-height:1.65;margin-bottom:20px;max-width:380px}
    .wgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:left;width:100%}
    .wcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:all .14s}
    .wcard:hover{border-color:var(--cyan);background:var(--cyan-gl)}
    .wcard-t{font-size:.78rem;font-weight:600;margin-bottom:4px;color:var(--text)}
    .wcard-d{font-size:.67rem;color:var(--muted);line-height:1.4}

    /* Disclaimer + Input */
    .disclaimer{padding:5px 20px;border-top:1px solid rgba(251,191,36,.12);background:rgba(251,191,36,.03);font-size:.66rem;color:#92742a;position:fixed;bottom:85px;left:var(--sb-w);right:0;z-index:90}
    .input-wrap{padding:11px 20px 15px;border-top:1px solid var(--border);background:var(--surface);position:fixed;bottom:0;left:var(--sb-w);right:0;z-index:90}
    .input-row{display:flex;gap:8px;align-items:flex-end;position:relative}
    .input-row textarea{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:.82rem;padding:9px 36px 9px 13px;resize:none;outline:none;min-height:40px;max-height:130px;line-height:1.5;transition:border-color .14s}
    .input-row textarea:focus{border-color:var(--cyan)}
    .input-row textarea::placeholder{color:var(--muted)}
    .clear-input{position:absolute;right:50px;bottom:10px;width:20px;height:20px;border-radius:50%;background:var(--border2);border:none;color:var(--muted);display:none;align-items:center;justify-content:center;cursor:pointer;transition:all .14s}
    .clear-input.show{display:flex}
    .clear-input:hover{background:rgba(248,113,113,.2);color:var(--red)}
    .send-btn{width:40px;height:40px;border-radius:var(--r);background:var(--cyan);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .14s}
    .send-btn:hover{opacity:.85}
    .send-btn:disabled{opacity:.35;cursor:default}
    .input-hint{font-size:.61rem;color:var(--muted);margin-top:5px}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:8px 16px;font-size:.75rem;color:var(--text2);font-family:var(--mono);transition:transform .3s ease;z-index:300;pointer-events:none;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .toast.ok{border-color:rgba(52,211,153,.3);color:var(--emerald)}
    .toast.err{border-color:rgba(248,113,113,.3);color:var(--red)}

    /* MODAL EVALUADOR */
    .modal-overlay{position:fixed;inset:0;background:rgba(2,6,23,.85);backdrop-filter:blur(6px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 48px rgba(0,0,0,.5)}
    .modal-box::-webkit-scrollbar{width:3px}
    .modal-box::-webkit-scrollbar-thumb{background:var(--border2)}
    .modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .modal-head-l h2{font-size:.95rem;font-weight:700;margin-bottom:3px}
    .modal-head-l p{font-size:.72rem;color:var(--muted);line-height:1.45}
    .modal-close{background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--muted);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .14s;font-size:.85rem;line-height:1}
    .modal-close:hover{border-color:var(--red);color:var(--red)}
    .modal-body{padding:14px 20px}
    .modal-foot{padding:0 20px 18px}
    .eval-card{display:grid;grid-template-columns:14px 1fr auto;align-items:start;gap:10px;padding:10px 12px;margin-bottom:5px;border:1px solid var(--border);border-left:3px solid transparent;border-radius:var(--r);cursor:pointer;transition:all .15s;background:transparent}
    .eval-card:hover{border-color:var(--border2);background:rgba(255,255,255,.02)}
    .eval-card.active{background:var(--cyan-gl)}
    .eval-card.active.wh{border-left-color:var(--red);border-color:rgba(248,113,113,.2)}
    .eval-card.active.wm{border-left-color:var(--amber);border-color:rgba(251,191,36,.2)}
    .eval-card.active.wl{border-left-color:var(--emerald);border-color:rgba(52,211,153,.2)}
    .eval-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);margin-top:2px;transition:all .14s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .eval-card.active .eval-chk{background:var(--cyan);border-color:var(--cyan)}
    .eval-chk-mark{display:none}
    .eval-card.active .eval-chk-mark{display:block}
    .eval-body-t{font-size:.75rem;font-weight:600;color:var(--text);margin-bottom:2px}
    .eval-body-d{font-size:.64rem;color:var(--muted);line-height:1.3}
    .eval-pill{font-size:.55rem;font-family:var(--mono);padding:2px 6px;border-radius:3px;white-space:nowrap;margin-top:1px}
    .eval-pill.ph{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
    .eval-pill.pm{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
    .eval-pill.pl{background:rgba(52,211,153,.1);color:var(--emerald);border:1px solid rgba(52,211,153,.2)}
    .eval-result{margin-top:12px;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface2);display:none}
    .eval-result.show{display:block}
    .eval-bar-track{height:3px;background:var(--border2);border-radius:2px;margin-bottom:8px;overflow:hidden}
    .eval-bar-fill{height:100%;border-radius:2px;transition:width .4s ease,background .3s}
    .eval-bar-fill.lv-low{background:var(--emerald)}
    .eval-bar-fill.lv-medium{background:var(--amber)}
    .eval-bar-fill.lv-high{background:var(--red)}
    .eval-r-level{font-size:.62rem;font-family:var(--mono);letter-spacing:.06em;margin-bottom:4px}
    .eval-r-level.lv-low{color:var(--emerald)}
    .eval-r-level.lv-medium{color:var(--amber)}
    .eval-r-level.lv-high{color:var(--red)}
    .eval-r-text{font-size:.69rem;color:var(--muted);line-height:1.5}
    .eval-consult-btn{width:100%;margin-top:14px;padding:11px;background:var(--cyan);color:var(--bg);border:none;border-radius:var(--r);font-family:var(--sans);font-weight:700;font-size:.8rem;cursor:pointer;transition:opacity .14s}
    .eval-consult-btn:hover{opacity:.88}

    /* Access overlay */
    #access-overlay{position:fixed;inset:0;background:rgba(13,27,46,.97);display:flex;align-items:center;justify-content:center;z-index:9999}
    .overlay-box{text-align:center}
    .overlay-icon{width:48px;height:48px;border-radius:12px;background:var(--cyan-dim);border:1px solid rgba(0,212,255,.2);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px}
    #access-overlay h2{font-size:.95rem;font-weight:700;margin-bottom:6px}
    #access-overlay p{font-size:.76rem;color:var(--muted);max-width:260px}
    #access-overlay a{margin-top:14px;display:inline-block;color:var(--cyan);font-size:.74rem;text-decoration:none}
    #access-overlay a:hover{text-decoration:underline}


    /* Tags clickables */
    .ctag-link{cursor:pointer;text-decoration:none;transition:opacity .14s}
    .ctag-link:hover{opacity:.75}
    /* Tag morado para NCh */
    .ctag-p{color:#c084fc;border-color:rgba(192,132,252,.25);background:rgba(192,132,252,.06)}
    /* Tag azul para CEAL */
    .ctag-b{color:#60a5fa;border-color:rgba(96,165,250,.25);background:rgba(96,165,250,.06)}

    /* Modal canales denuncia */
    .den-modal-overlay{position:fixed;inset:0;background:rgba(2,6,23,.88);backdrop-filter:blur(6px);z-index:600;display:none;align-items:center;justify-content:center;padding:20px}
    .den-modal-overlay.open{display:flex}
    .den-modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 48px rgba(0,0,0,.5)}
    .den-modal::-webkit-scrollbar{width:3px}
    .den-modal::-webkit-scrollbar-thumb{background:var(--border2)}
    .den-modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .den-modal-head h2{font-size:.95rem;font-weight:700;margin-bottom:3px}
    .den-modal-head p{font-size:.72rem;color:var(--muted);line-height:1.4}
    .den-modal-close{background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--muted);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .14s;font-size:.85rem}
    .den-modal-close:hover{border-color:var(--red);color:var(--red)}
    .den-modal-body{padding:16px 20px 20px}
    .den-canal{border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;transition:border-color .14s}
    .den-canal:hover{border-color:var(--border2)}
    .den-canal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
    .den-canal-name{font-size:.8rem;font-weight:700;color:var(--text)}
    .den-canal-badge{font-size:.58rem;font-family:var(--mono);padding:2px 7px;border-radius:10px}
    .den-canal-badge.prim{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
    .den-canal-badge.sec{background:rgba(52,211,153,.1);color:var(--emerald);border:1px solid rgba(52,211,153,.2)}
    .den-canal-badge.adv{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
    .den-canal-desc{font-size:.73rem;color:var(--muted);line-height:1.5;margin-bottom:8px}
    .den-canal-link{display:inline-flex;align-items:center;gap:5px;font-size:.68rem;font-family:var(--mono);color:var(--cyan);text-decoration:none;border:1px solid rgba(0,212,255,.2);padding:3px 9px;border-radius:6px;transition:all .14s}
    .den-canal-link:hover{background:var(--cyan-gl);border-color:var(--cyan)}
    .den-disclaimer{margin-top:14px;padding:10px 12px;background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.15);border-radius:var(--r);font-size:.68rem;color:#92742a;line-height:1.5}


    /* Scroll to bottom button */
    .mob-tags-toggle { display: none; background: transparent; border: 1px solid var(--border2); border-radius: 6px; color: var(--muted); font-size: .6rem; font-family: var(--mono); padding: 4px 8px; cursor: pointer; transition: all .14s; align-items: center; gap: 4px; }
    .mob-tags-toggle:hover { border-color: var(--cyan); color: var(--cyan); }
    .mob-tags-row { display: none; }
    .scroll-down-btn {
      position: absolute;
      bottom: 16px;
      right: 20px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text2);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all .15s;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .scroll-down-btn.show { display: flex; }
    .scroll-down-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-gl); }
    .scroll-down-btn .unread-dot {
      position: absolute;
      top: -3px; right: -3px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      display: none;
    }
    .scroll-down-btn .unread-dot.show { display: block; }
    .messages-wrap { position: relative; flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    @media(max-width:1024px){
      .chat-head-r .ctag-g,.chat-head-r .ctag-a{display:none}
    }
    @media(max-width:768px){
      :root{--sb-w:0px}
      main{grid-template-columns:1fr}
      .sidebar{display:none}
      .chat-head{padding:10px 14px;flex-wrap:wrap;gap:5px}
  
    .chat-head-top{padding:11px 20px;display:flex;align-items:center;justify-content:space-between}
    .chat-head-session{padding:4px 20px 5px;border-top:1px solid var(--border);background:rgba(0,212,255,.03);display:none;align-items:center;justify-content:space-between}
    .chat-head-session.show{display:flex}
    .chat-head-session-title{font-size:.63rem;font-family:var(--mono);color:var(--muted);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px}
    .chat-head-session-date{font-size:.58rem;color:var(--muted);font-family:var(--mono);flex-shrink:0}
    .chat-head-l h1{font-size:.88rem}
      .chat-head-l p{font-size:.63rem}
      .chat-head-r{gap:4px;flex-wrap:wrap}
      .ctag{font-size:.56rem;padding:2px 7px}
      .icon-btn{font-size:.6rem;padding:4px 8px}
      .messages{padding:12px 14px;gap:10px}
      .msg-bubble{font-size:.8rem;padding:9px 12px}
      .msg-av{width:22px;height:22px;font-size:.55rem}
      .input-wrap{padding:8px 14px 12px}
      .input-row textarea{font-size:.8rem;padding:8px 34px 8px 12px}
      .send-btn{width:36px;height:36px}
      .eval-trigger{padding:6px 11px;font-size:.7rem}
      .nav-pill{display:none}
      .user-chip .user-org{display:none}
      .den-modal{max-width:100%;border-radius:12px 12px 0 0}
      .den-modal-overlay{align-items:flex-end;padding:0}
    }
    @media(max-width:480px){
      .chat-head-r .ctag{display:none}
      .chat-head-r .ctag-c{display:inline-flex}
      .chat-head-r .icon-btn span{display:none}
      .hist-drawer{width:100%}
      nav{padding:0 14px}
      .nav-brand span{display:none}
    }

    /* ─── TABLET ──────────────────────────────────────────────────── *
    .mob-tools-toggle { display: none; }
    .mob-tools-row { display: none; }
    .mob-tool-btn { }

    /* ═══ MOBILE ═══════════════════════════════════════════════ */
    @media (max-width: 768px) {

      /* Reset ALL desktop fixed positioning */
      .chat-head, .messages, .disclaimer, .input-wrap {
        position: relative !important;
        top: auto !important; left: auto !important;
        right: auto !important; bottom: auto !important;
        width: auto !important;
      }

      /* Full viewport flex column */
      html, body { height: 100%; }
      body { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
      main { display: flex; flex-direction: column; flex: 1; margin-top: 0 !important; height: 0; min-height: 0; overflow: hidden; }
      .sidebar { display: none !important; }

      /* ── NAV: logo | [spacer] | user-chip | eval-btn ── */
      nav { position: relative; height: auto; padding: 8px 10px; flex-wrap: nowrap; gap: 6px; }
      .nav-brand { flex-shrink: 0; }
      .nav-brand span { display: none; }
      .nav-brand img { height: 24px; }
      .nav-pill { display: none; }
      .nav-right { display: flex; align-items: center; gap: 6px; flex: 1; justify-content: flex-end; min-width: 0; }
      .user-chip { flex-shrink: 1; min-width: 0; max-width: 160px; }
      .user-org, .user-expiry { display: none; }
      .user-name { font-size: .6rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .user-avatar { width: 20px; height: 20px; font-size: .52rem; flex-shrink: 0; }
      .eval-trigger { flex-shrink: 0; height: 32px; padding: 0 10px; font-size: .66rem; gap: 4px; box-shadow: none; white-space: nowrap; }
      .eval-trigger svg { width: 12px; height: 12px; }

      /* ── CHAT WRAP ── */
      .chat-wrap { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }

      /* ── CHAT HEAD: 2 rows ──
         Row 1: Title | Info▾ | Tools▾ 
         Row 2: session banner (if active) */
      .chat-head { flex-shrink: 0; padding: 0; border-bottom: 1px solid var(--border); background: var(--bg); }
      .chat-head-top { padding: 6px 10px; display: flex; align-items: center; gap: 6px; }
      .chat-head-l h1 { font-size: .8rem; white-space: nowrap; flex-shrink: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
      .chat-head-l p { display: none; }
      .chat-head-r { display: flex; align-items: center; gap: 4px; flex-shrink: 0; margin-left: auto; }
      .chat-head-r .ctag { display: none; }
      .chat-head-r .ctag-c { display: none; }
      .icon-btn { display: none; } /* hidden — moved to Tools menu */

      /* Info toggle */
      .mob-tags-toggle { display: flex !important; font-size: .6rem; padding: 4px 7px; order: 0; }

      /* Tools toggle */
      .mob-tools-toggle { display: flex !important; }

      /* Dropdown rows */
      .mob-tags-row { display: none; flex-wrap: wrap; gap: 5px; padding: 5px 10px 7px; border-top: 1px solid var(--border); background: var(--bg); }
      .mob-tags-row.open { display: flex; }
      .mob-tags-row .ctag { display: inline-flex !important; font-size: .55rem; padding: 2px 7px; }

      .mob-tools-row { display: none; flex-direction: column; border-top: 1px solid var(--border); background: var(--surface); }
      .mob-tools-row.open { display: flex; }
      .mob-tool-btn { display: flex; align-items: center; gap: 7px; padding: 10px 14px; font-size: .78rem; color: var(--text2); cursor: pointer; border-bottom: 1px solid var(--border); background: transparent; border-left: none; border-right: none; border-top: none; font-family: var(--sans); text-align: left; }
      .mob-tool-btn:last-child { border-bottom: none; }
      .mob-tool-btn:hover { background: var(--cyan-gl); color: var(--text); }
      .mob-tool-btn.danger:hover { background: rgba(248,113,113,.05); color: var(--red); }
      .mob-tool-btn svg { flex-shrink: 0; }

      /* ── MESSAGES: THE scroll area ── */
      .messages-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
      .messages { flex: 1; overflow-y: scroll !important; -webkit-overflow-scrolling: touch; padding: 10px; display: flex !important; flex-direction: column; gap: 8px; min-height: 0; height: 0; }
      .msg { gap: 5px; }
      .msg.user { max-width: 90%; align-self: flex-end; }
      .msg.assistant { max-width: 98%; align-self: flex-start; }
      .msg-av { width: 20px; height: 20px; font-size: .5rem; margin-top: 2px; flex-shrink: 0; }
      .msg-bubble { font-size: .75rem; padding: 7px 10px; line-height: 1.5; }
      .doc-block { font-size: .6rem; padding: 8px; line-height: 1.4; word-break: break-word; }
      .doc-copy { font-size: .52rem; padding: 2px 5px; }

      /* ── WELCOME ── */
      .welcome { padding: 14px 10px; max-width: 100%; }
      .welcome-icon { width: 36px; height: 36px; margin-bottom: 8px; }
      .welcome h2 { font-size: .88rem; }
      .welcome p { font-size: .7rem; margin-bottom: 10px; }
      .wgrid { grid-template-columns: 1fr; gap: 5px; }
      .wcard { padding: 9px 10px; }
      .wcard-t { font-size: .72rem; }
      .wcard-d { font-size: .6rem; }

      /* ── BOTTOM ── */
      .disclaimer { flex-shrink: 0; font-size: .57rem; padding: 3px 10px; line-height: 1.3; }
      .input-wrap { flex-shrink: 0; padding: 6px 10px 8px; background: var(--surface); }
      .input-row { gap: 5px; }
      .input-row textarea { font-size: .76rem; padding: 8px 10px; min-height: 36px; max-height: 80px; }
      .send-btn { width: 36px; height: 36px; flex-shrink: 0; }
      .clear-input { display: none !important; }
      .input-hint { font-size: .53rem; margin-top: 2px; }

      /* ── MODALS ── */
      .modal-overlay, .den-modal-overlay { align-items: flex-end; padding: 0; }
      .modal-box, .den-modal { border-radius: 14px 14px 0 0; max-height: 85vh; max-width: 100%; }
      .hist-drawer { width: 100%; }
      .scroll-down-btn { right: 10px; bottom: 10px; }
      .toast { bottom: 80px; }
    }

    @media (max-width: 390px) {
      .eval-trigger span { font-size: .6rem; }
    }
