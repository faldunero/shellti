<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Diagnostic - Ley N° 21.719</title>
    <style>
        :root {
            --cyan: #00D4FF;
            --green: #34D399;
            --deep: #020617;
            --silver: #E2E8F0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--deep) 0%, #1a2332 100%);
            color: var(--silver);
            min-height: 100vh;
        }
        .site-header {
            background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            padding: 20px 0;
        }
        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .header-content h1 {
            font-size: 24px;
            color: var(--cyan);
            margin: 0;
        }
        .header-content p {
            margin: 5px 0 0 0;
            color: var(--silver);
            opacity: 0.8;
            font-size: 14px;
        }
        main {
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
        }
        .auth-section {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--cyan);
            border-radius: 12px;
            padding: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--cyan);
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--cyan);
            border-radius: 8px;
            color: var(--silver);
        }
        .form-group input::placeholder {
            color: rgba(226, 232, 240, 0.5);
        }
        .btn {
            padding: 12px 24px;
            background: var(--cyan);
            color: var(--deep);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover {
            background: var(--green);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
        }
        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        .section {
            margin-bottom: 30px;
        }
        .section h3 {
            color: var(--cyan);
            margin-bottom: 20px;
            font-size: 18px;
        }
        .question-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 8px;
        }
        .question-text {
            margin-bottom: 12px;
            font-weight: 500;
            color: var(--silver);
        }
        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-label:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.4);
        }
        .option-label input {
            margin-right: 8px;
            cursor: pointer;
        }
        .progress-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 30px;
        }
        .progress-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(var(--cyan) 0deg, var(--cyan) var(--progress-angle, 0deg), rgba(255, 255, 255, 0.1) var(--progress-angle, 0deg));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .progress-circle-inner {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .progress-percent {
            font-size: 24px;
            font-weight: bold;
            color: var(--cyan);
        }
        .progress-percent-label {
            font-size: 10px;
            color: var(--silver);
            opacity: 0.7;
        }
        .progress-container {
            flex: 1;
        }
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }
        .progress-text {
            font-size: 12px;
            color: var(--silver);
            opacity: 0.8;
        }
        .navigation {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            margin-top: 30px;
        }
        .nav-btn {
            flex: 1;
        }
        .summary {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid var(--green);
            border-radius: 12px;
            padding: 24px;
            margin-top: 30px;
            text-align: center;
        }
        .summary h3 {
            color: var(--green);
            margin-bottom: 10px;
        }
        .error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #FF6B6B;
            color: #FF6B6B;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .site-footer {
            background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            padding: 30px 20px;
            color: var(--silver);
            opacity: 0.7;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <h1>🔍 ShellTI</h1>
            <p>Deep Diagnostic - Evaluación de Cumplimiento Ley 21.719</p>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="error" id="errorMessage"></div>

            <div class="auth-section" id="authSection">
                <h2 style="color: var(--cyan); margin-bottom: 20px;">Acceso</h2>
                <div class="form-group">
                    <label>Empresa *</label>
                    <input type="text" id="empresa" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Token *</label>
                    <input type="text" id="token" placeholder="shellti-client-" required>
                </div>
                <button class="btn" onclick="authenticate()" style="width: 100%;">Acceder</button>
            </div>

            <div id="questionsSection" style="display:none;">
                <div class="progress-section">
                    <div class="progress-circle" id="progressCircle">
                        <div class="progress-circle-inner">
                            <div class="progress-percent" id="progressPercent">0%</div>
                            <div class="progress-percent-label">completado</div>
                        </div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-text"><span id="currentQuestion">0</span>/<span id="totalQuestions">0</span> preguntas respondidas</div>
                    </div>
                </div>

                <form id="form">
                    <div id="questionsContainer"></div>

                    <div class="navigation">
                        <button type="button" class="btn btn-secondary nav-btn" onclick="prevQuestion()" id="prevBtn" style="display:none;">← Anterior</button>
                        <button type="submit" class="btn nav-btn" id="submitBtn" style="display:none;">Enviar</button>
                        <button type="button" class="btn nav-btn" onclick="nextQuestion()" id="nextBtn" style="display:none;">Siguiente →</button>
                    </div>
                </form>

                <div class="summary" id="summary" style="display:none;">
                    <h3>✅ Respuestas guardadas</h3>
                    <p>Trazabilidad completada en Firebase</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 ShellTI Technology Consultancy. Todos los derechos reservados.</p>
        <p>Ley N° 21.719 - Protección de Datos Personales</p>
    </footer>

    <!-- Firebase temporalmente deshabilitado -->
    <!-- <script async defer src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script async defer src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script> -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGn_dUYJI8WiQ6QfaTBGHOgr6FDHIbiI0",
            authDomain: "shellti-diagnostico.firebaseapp.com",
            projectId: "shellti-diagnostico",
            storageBucket: "shellti-diagnostico.appspot.com",
            messagingSenderId: "808197164295",
            appId: "1:808197164295:web:4d863b69d6df9ee3e249a2"
        };

        let db, clientData = {};
        let currentPage = 0;
        const questionsPerPage = 5;
        let allQuestions = [];
        let responses = {};

        const questions = [
            // I. Gobernanza (5)
            { section: "I. Gobernanza", text: "¿Tiene usted una Política documentada de protección de datos?" },
            { section: "I. Gobernanza", text: "¿Tiene usted un Responsable de protección de datos designado?" },
            { section: "I. Gobernanza", text: "¿Cuenta con Auditorías internas de cumplimiento?" },
            { section: "I. Gobernanza", text: "¿Existe un Registro de tratamiento de datos personales?" },
            { section: "I. Gobernanza", text: "¿Tiene políticas de privacidad actualizadas?" },

            // II. Seguridad Técnica (5)
            { section: "II. Seguridad Técnica", text: "¿Implementa cifrado de datos en reposo?" },
            { section: "II. Seguridad Técnica", text: "¿Utiliza cifrado en tránsito (HTTPS/TLS)?" },
            { section: "II. Seguridad Técnica", text: "¿Tiene controles de acceso basados en roles?" },
            { section: "II. Seguridad Técnica", text: "¿Implementa autenticación multifactor?" },
            { section: "II. Seguridad Técnica", text: "¿Mantiene logs de acceso a datos personales?" },

            // III. Gestión de Incidentes (5)
            { section: "III. Gestión de Incidentes", text: "¿Tiene un Plan de respuesta a brechas de datos?" },
            { section: "III. Gestión de Incidentes", text: "¿Realiza notificaciones oportunas de incidentes?" },
            { section: "III. Gestión de Incidentes", text: "¿Tiene procesos de investigación de incidentes?" },
            { section: "III. Gestión de Incidentes", text: "¿Mantiene registro de incidentes históricos?" },
            { section: "III. Gestión de Incidentes", text: "¿Realiza análisis post-incidente (lecciones aprendidas)?" },

            // IV. Derechos de los Titulares (5)
            { section: "IV. Derechos de los Titulares", text: "¿Facilita acceso a datos personales solicitados?" },
            { section: "IV. Derechos de los Titulares", text: "¿Permite rectificación de datos inexactos?" },
            { section: "IV. Derechos de los Titulares", text: "¿Implementa derecho a supresión ('derecho al olvido')?" },
            { section: "IV. Derechos de los Titulares", text: "¿Permite limitación del tratamiento de datos?" },
            { section: "IV. Derechos de los Titulares", text: "¿Ofrece portabilidad de datos?" },

            // V. Consentimiento y Transparencia (5)
            { section: "V. Consentimiento y Transparencia", text: "¿Obtiene consentimiento explícito previo?" },
            { section: "V. Consentimiento y Transparencia", text: "¿Proporciona información clara sobre tratamiento?" },
            { section: "V. Consentimiento y Transparencia", text: "¿Documenta todas las bases legales de tratamiento?" },
            { section: "V. Consentimiento y Transparencia", text: "¿Informa sobre derechos disponibles?" },
            { section: "V. Consentimiento y Transparencia", text: "¿Tiene declaraciones de privacidad accesibles?" },

            // VI. Evaluación de Impacto (5)
            { section: "VI. Evaluación de Impacto", text: "¿Realiza Evaluaciones de Impacto en privacidad?" },
            { section: "VI. Evaluación de Impacto", text: "¿Evalúa riesgos antes de nuevos tratamientos?" },
            { section: "VI. Evaluación de Impacto", text: "¿Documentan análisis de riesgos?" },
            { section: "VI. Evaluación de Impacto", text: "¿Implementan medidas mitigantes identificadas?" },
            { section: "VI. Evaluación de Impacto", text: "¿Revisan evaluaciones periódicamente?" },

            // VII. Personal y Capacitación (5)
            { section: "VII. Personal y Capacitación", text: "¿Capacita a personal sobre protección de datos?" },
            { section: "VII. Personal y Capacitación", text: "¿Tienen clausulas de confidencialidad en contratos?" },
            { section: "VII. Personal y Capacitación", text: "¿Implementan segregación de funciones?" },
            { section: "VII. Personal y Capacitación", text: "¿Revisan permisos de acceso regularmente?" },
            { section: "VII. Personal y Capacitación", text: "¿Hay políticas de acceso remoto seguro?" },

            // VIII. Transferencias Internacionales (5)
            { section: "VIII. Transferencias Internacionales", text: "¿Evalúan destinos de transferencia de datos?" },
            { section: "VIII. Transferencias Internacionales", text: "¿Utilizan cláusulas contractuales estándar?" },
            { section: "VIII. Transferencias Internacionales", text: "¿Cumplen con restricciones de destinos?" },
            { section: "VIII. Transferencias Internacionales", text: "¿Tienen acuerdos de procesamiento de datos?" },
            { section: "VIII. Transferencias Internacionales", text: "¿Notifican sobre transferencias a terceros?" },

            // IX. Terceros y Proveedores (5)
            { section: "IX. Terceros y Proveedores", text: "¿Evalúan proveedores antes de contratar?" },
            { section: "IX. Terceros y Proveedores", text: "¿Tienen contratos que garanticen protección?" },
            { section: "IX. Terceros y Proveedores", text: "¿Auditan proveedores regularmente?" },
            { section: "IX. Terceros y Proveedores", text: "¿Tienen clausulas de terminación en contratos?" },
            { section: "IX. Terceros y Proveedores", text: "¿Controlan subcontratistas de proveedores?" },

            // X. Cumplimiento y Documentación (5)
            { section: "X. Cumplimiento y Documentación", text: "¿Mantienen Registro de Actividades de Tratamiento?" },
            { section: "X. Cumplimiento y Documentación", text: "¿Documentan decisiones sobre privacidad?" },
            { section: "X. Cumplimiento y Documentación", text: "¿Tienen procedimientos documentados?" },
            { section: "X. Cumplimiento y Documentación", text: "¿Realizan auditorías externas periódicamente?" },
            { section: "X. Cumplimiento y Documentación", text: "¿Cumplen con obligaciones de retención de datos?" }
        ];

        window.addEventListener('load', function() {
            // Firebase temporalmente deshabilitado
            // firebase.initializeApp(firebaseConfig);
            // db = firebase.database();
            allQuestions = questions.map((q, idx) => ({
                ...q,
                id: `q${idx + 1}`
            }));
        });

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        function authenticate() {
            const empresa = document.getElementById('empresa').value;
            const email = document.getElementById('email').value;
            const token = document.getElementById('token').value;

            if (!empresa || !email || !token) {
                showError('Completa todos los campos');
                return;
            }

            if (!token.startsWith('shellti-client-')) {
                showError('Token inválido');
                return;
            }

            clientData = { empresa, email, token };
            renderQuestions();
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('questionsSection').style.display = 'block';
            updateProgress();
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            const start = currentPage * questionsPerPage;
            const end = start + questionsPerPage;
            const pageQuestions = allQuestions.slice(start, end);

            let html = '';
            let currentSection = '';

            pageQuestions.forEach(q => {
                if (q.section !== currentSection) {
                    currentSection = q.section;
                    html += `<div class="section"><h3>${currentSection}</h3>`;
                }

                const value = getQuestionValue(q.id);
                html += `
                    <div class="question-item">
                        <div class="question-text">${q.text} *</div>
                        <div class="options">
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="Si" ${value === 'Si' ? 'checked' : ''} required onchange="saveResponse('${q.id}', 'Si')">
                                Sí
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="Parcial" ${value === 'Parcial' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'Parcial')">
                                Parcial
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="No" ${value === 'No' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'No')">
                                No
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="NA" ${value === 'NA' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'NA')">
                                N/A
                            </label>
                        </div>
                    </div>
                `;
            });

            if (pageQuestions.length > 0) {
                html += '</div>';
            }

            container.innerHTML = html;
            updateNavigation();
            updateProgress();
        }

        function getQuestionValue(questionId) {
            return responses[questionId] || '';
        }

        function saveResponse(questionId, value) {
            responses[questionId] = value;
            updateProgress();
        }

        function updateNavigation() {
            const totalPages = Math.ceil(allQuestions.length / questionsPerPage);
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');

            prevBtn.style.display = currentPage > 0 ? 'block' : 'none';
            nextBtn.style.display = currentPage < totalPages - 1 ? 'block' : 'none';
            submitBtn.style.display = currentPage === totalPages - 1 ? 'block' : 'none';
        }

        function updateProgress() {
            const totalQuestions = allQuestions.length;
            const answeredQuestions = allQuestions.filter(q => getQuestionValue(q.id)).length;
            const percentage = Math.round((answeredQuestions / totalQuestions) * 100);
            const angleInDegrees = (percentage / 100) * 360;

            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('currentQuestion').textContent = answeredQuestions;
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('progressPercent').textContent = percentage + '%';

            // Actualizar círculo de progreso
            document.getElementById('progressCircle').style.setProperty('--progress-angle', angleInDegrees + 'deg');
        }

        function nextQuestion() {
            const totalPages = Math.ceil(allQuestions.length / questionsPerPage);
            if (currentPage < totalPages - 1) {
                currentPage++;
                renderQuestions();
                window.scrollTo(0, 0);
            }
        }

        function prevQuestion() {
            if (currentPage > 0) {
                currentPage--;
                renderQuestions();
                window.scrollTo(0, 0);
            }
        }

        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();

            try {
                const stats = { Si: 0, Parcial: 0, No: 0, NA: 0 };

                for (let key in responses) {
                    if (responses[key]) {
                        stats[responses[key]]++;
                    }
                }

                const responseId = 'deep-' + Date.now();
                const data = {
                    responseId,
                    timestamp: new Date().toISOString(),
                    cliente: clientData,
                    respuestas: responses,
                    estadisticas: stats
                };

                console.log('Formulario completado:', data);

                // Mostrar resumen
                document.getElementById('questionsSection').style.display = 'none';
                document.getElementById('summary').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                showError('Error al procesar: ' + error.message);
            }
        });
    </script>
</body>
</html>
