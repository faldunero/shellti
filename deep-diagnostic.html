<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Diagnostic - Ley N° 21.719</title>
    <style>
        :root { --cyan: #00D4FF; --green: #34D399; --deep: #020617; --silver: #E2E8F0; --muted: #94A3B8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--deep) 0%, #1a2332 100%); color: var(--silver); display: flex; flex-direction: column; min-height: 100vh; }
        header { background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%); padding: 16px 40px; display: flex; align-items: center; gap: 20px; }
        header img { height: 40px; width: 40px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.5)); }
        .header-brand { display: flex; flex-direction: column; gap: 2px; }
        .header-brand-name { font-weight: 800; font-size: 1.1rem; color: var(--silver); letter-spacing: -0.5px; }
        .header-brand-name span { color: var(--cyan); }
        .header-brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; }
        main { flex: 1; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(10px); border-radius: 8px; padding: 40px; }
        .auth-section { background: rgba(0, 212, 255, 0.03); border-radius: 8px; padding: 24px; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--cyan); font-size: 13px; }
        .form-group input { width: 100%; padding: 10px 12px; background: rgba(255, 255, 255, 0.05); border: none; border-radius: 4px; color: var(--silver); font-size: 13px; }
        .form-group input:focus { outline: none; background: rgba(0, 212, 255, 0.08); }
        .btn { padding: 12px 24px; background: var(--cyan); color: var(--deep); border: none; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0, 212, 255, 0.25); }
        .btn-secondary { background: transparent; color: var(--cyan); }
        .btn-secondary:hover { background: rgba(0, 212, 255, 0.08); }
        .progress-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 30px; }
        .progress-circle { width: 100px; height: 100px; border-radius: 50%; background: conic-gradient(var(--cyan) 0deg, var(--cyan) var(--progress-angle, 0deg), rgba(255, 255, 255, 0.1) var(--progress-angle, 0deg)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .progress-circle-inner { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-percent { font-size: 24px; font-weight: bold; color: var(--cyan); }
        .progress-percent-label { font-size: 10px; color: var(--silver); opacity: 0.7; }
        .progress-container { flex: 1; }
        .progress-bar { height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 4px; margin-bottom: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--green)); width: 0%; transition: width 0.3s; border-radius: 4px; }
        .progress-text { font-size: 12px; color: var(--muted); }
        .section h3 { color: var(--cyan); margin-bottom: 20px; font-size: 16px; font-weight: 700; }
        .question-item { background: rgba(255, 255, 255, 0.02); padding: 20px; margin-bottom: 16px; border-radius: 6px; }
        .question-text { margin-bottom: 12px; font-weight: 500; color: var(--silver); font-size: 13px; }
        .options { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-top: 12px; }
        .option-label { display: flex; align-items: center; padding: 8px 10px; background: rgba(0, 212, 255, 0.05); border-radius: 4px; cursor: pointer; transition: all 0.2s; font-size: 12px; }
        .option-label:hover { background: rgba(0, 212, 255, 0.1); }
        .option-label input { margin-right: 6px; cursor: pointer; }
        .navigation { display: flex; gap: 12px; justify-content: center; margin-top: 40px; }
        .nav-btn { padding: 10px 20px; font-size: 12px; }
        .summary { margin-top: 40px; }
        .summary h3 { color: var(--cyan); margin-bottom: 30px; font-size: 18px; text-align: center; }
        .results-header { text-align: center; margin-bottom: 40px; }
        .overall-score { font-size: 48px; font-weight: 900; color: var(--cyan); font-family: 'JetBrains Mono', monospace; }
        .overall-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 8px; }
        .domain-card { background: rgba(255, 255, 255, 0.02); padding: 20px; margin-bottom: 16px; border-radius: 6px; }
        .domain-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .domain-name { font-weight: 600; color: var(--silver); font-size: 13px; }
        .score-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .score-bar-track { flex: 1; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; overflow: hidden; }
        .score-bar-fill { height: 100%; border-radius: 3px; }
        .risk-badge { display: inline-block; padding: 4px 8px; border-radius: 3px; font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }
        .risk-critical { background: rgba(255, 107, 107, 0.2); color: #FF6B6B; }
        .risk-high { background: rgba(255, 165, 0, 0.2); color: #F59E0B; }
        .risk-medium { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
        .risk-low { background: rgba(52, 211, 153, 0.2); color: var(--green); }
        footer { background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%); padding: 30px 40px; display: flex; justify-content: space-between; align-items: center; gap: 30px; border-top: 1px solid rgba(0, 212, 255, 0.1); margin-top: auto; font-size: 11px; color: var(--muted); }
        .footer-logo img { height: 32px; width: 32px; object-fit: contain; filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.4)); }
        .footer-logo a span { font-weight: 700; color: var(--silver); }
        .error { background: rgba(255, 107, 107, 0.1); color: #FF6B6B; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-size: 12px; display: none; }
        .error.show { display: block; }
    </style>
</head>
<body>
    <header>
        <img src="imagenes/webp/lobo_shellti.webp" alt="ShellTI">
        <div class="header-brand">
            <div class="header-brand-name">Shell<span>TI</span></div>
            <div class="header-brand-sub">.com · Digital Ecosystems</div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="error" id="errorMessage"></div>

            <div class="auth-section" id="authSection">
                <h2 style="color: var(--cyan); margin-bottom: 20px; font-size: 16px;">Acceso a Evaluación</h2>
                <div class="form-group">
                    <label>Empresa *</label>
                    <input type="text" id="empresa" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Token *</label>
                    <input type="text" id="token" placeholder="shellti-client-" required>
                </div>
                <button class="btn" onclick="login()" style="width: 100%;">Acceder</button>
            </div>

            <div id="questionsSection" style="display:none;">
                <div class="progress-section">
                    <div class="progress-circle" id="progressCircle">
                        <div class="progress-circle-inner">
                            <div class="progress-percent" id="progressPercent">0%</div>
                            <div class="progress-percent-label">completado</div>
                        </div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-text"><span id="currentQuestion">0</span>/50 respondidas</div>
                    </div>
                </div>

                <div id="questionsContainer"></div>

                <div class="navigation">
                    <button class="btn btn-secondary nav-btn" onclick="prevSection()" id="prevBtn" style="display:none;">← Anterior</button>
                    <button class="btn nav-btn" onclick="submitForm()" id="submitBtn" style="display:none;">Enviar Evaluación</button>
                    <button class="btn nav-btn" onclick="nextSection()" id="nextBtn" style="display:none;">Siguiente →</button>
                </div>

                <div class="summary" id="summary" style="display:none;">
                    <h3>Evaluación Completada</h3>
                    <div id="resultsContent" style="margin-top: 30px; text-align: left;"></div>
                    <button class="btn" onclick="downloadPDF()" style="width: 100%; margin-top: 40px;">Descargar Informe PDF</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
      <div class="footer-logo">
        <a href="https://shellti.com" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
          <img src="imagenes/webp/lobo_shellti.webp" alt="ShellTI Logo" />
          <span>ShellTI</span>
        </a>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
        <p style="text-align:right;">contacto@shellti.com<br>&copy; 2026 ShellTI. Todos los derechos reservados.</p>
      </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGn_dUYJI8WiQ6QfaTBGHOgr6FDHIbiI0",
            authDomain: "shellti-diagnostico.firebaseapp.com",
            databaseURL: "https://shellti-diagnostico-default-rtdb.firebaseio.com",
            projectId: "shellti-diagnostico",
            storageBucket: "shellti-diagnostico.appspot.com",
            messagingSenderId: "808197164295",
            appId: "1:808197164295:web:4d863b69d6df9ee3e249a2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let clientData = {};
        let currentSection = 0;
        let allQuestions = [];
        let responses = {};

        const sections = [
            "I. Gobernanza",
            "II. Seguridad Técnica",
            "III. Gestión de Incidentes",
            "IV. Derechos de Titulares",
            "V. Consentimiento y Transparencia",
            "VI. Evaluación de Impacto",
            "VII. Personal y Capacitación",
            "VIII. Transferencias Internacionales",
            "IX. Terceros y Proveedores",
            "X. Cumplimiento y Documentación"
        ];

        const questions = [
            { section: "I. Gobernanza", text: "¿Tiene usted una Política documentada de protección de datos?" },
            { section: "I. Gobernanza", text: "¿Ha designado un Responsable o Oficial de Protección de Datos (DPO)?" },
            { section: "I. Gobernanza", text: "¿Realiza auditorías internas periódicas sobre cumplimiento?" },
            { section: "I. Gobernanza", text: "¿Mantiene un Registro de Actividades de Tratamiento (RAT) actualizado?" },
            { section: "I. Gobernanza", text: "¿Revisa y actualiza regularmente sus políticas de privacidad?" },
            { section: "II. Seguridad Técnica", text: "¿Cifra datos personales en reposo?" },
            { section: "II. Seguridad Técnica", text: "¿Utiliza HTTPS/TLS para toda comunicación de datos personales?" },
            { section: "II. Seguridad Técnica", text: "¿Implementa control de acceso basado en roles (RBAC)?" },
            { section: "II. Seguridad Técnica", text: "¿Requiere autenticación multifactor (MFA) para acceso crítico?" },
            { section: "II. Seguridad Técnica", text: "¿Registra y monitorea acceso a datos personales?" },
            { section: "III. Gestión de Incidentes", text: "¿Tiene un plan documentado de respuesta a brechas de datos?" },
            { section: "III. Gestión de Incidentes", text: "¿Notifica brechas de datos en el plazo de 72 horas?" },
            { section: "III. Gestión de Incidentes", text: "¿Realiza investigaciones formales de incidentes de seguridad?" },
            { section: "III. Gestión de Incidentes", text: "¿Mantiene registro histórico de incidentes?" },
            { section: "III. Gestión de Incidentes", text: "¿Realiza análisis post-incidente (lecciones aprendidas)?" },
            { section: "IV. Derechos de Titulares", text: "¿Facilita acceso a datos personales solicitados?" },
            { section: "IV. Derechos de Titulares", text: "¿Permite rectificación de datos personales?" },
            { section: "IV. Derechos de Titulares", text: "¿Implementa derecho al olvido (supresión)?" },
            { section: "IV. Derechos de Titulares", text: "¿Limita el tratamiento cuando se solicita?" },
            { section: "IV. Derechos de Titulares", text: "¿Facilita portabilidad de datos?" },
            { section: "V. Consentimiento y Transparencia", text: "¿Obtiene consentimiento explícito previo?" },
            { section: "V. Consentimiento y Transparencia", text: "¿Proporciona información clara sobre tratamiento?" },
            { section: "V. Consentimiento y Transparencia", text: "¿Documenta bases legales del tratamiento?" },
            { section: "V. Consentimiento y Transparencia", text: "¿Informa sobre derechos disponibles?" },
            { section: "V. Consentimiento y Transparencia", text: "¿Mantiene declaraciones de privacidad accesibles?" },
            { section: "VI. Evaluación de Impacto", text: "¿Realiza Evaluación de Impacto en Privacidad (DPIA)?" },
            { section: "VI. Evaluación de Impacto", text: "¿Evalúa riesgos antes de nuevos tratamientos?" },
            { section: "VI. Evaluación de Impacto", text: "¿Documenta análisis de riesgos?" },
            { section: "VI. Evaluación de Impacto", text: "¿Implementa medidas mitigantes identificadas?" },
            { section: "VI. Evaluación de Impacto", text: "¿Revisa periódicamente evaluaciones de impacto?" },
            { section: "VII. Personal y Capacitación", text: "¿Capacita al personal en protección de datos?" },
            { section: "VII. Personal y Capacitación", text: "¿Incluye cláusulas de confidencialidad en contratos?" },
            { section: "VII. Personal y Capacitación", text: "¿Implementa segregación de funciones?" },
            { section: "VII. Personal y Capacitación", text: "¿Revisa periódicamente permisos de acceso?" },
            { section: "VII. Personal y Capacitación", text: "¿Tiene políticas de acceso remoto seguro?" },
            { section: "VIII. Transferencias Internacionales", text: "¿Evalúa destinos de transferencia de datos?" },
            { section: "VIII. Transferencias Internacionales", text: "¿Utiliza cláusulas contractuales estándar?" },
            { section: "VIII. Transferencias Internacionales", text: "¿Cumple restricciones de destinos de transferencia?" },
            { section: "VIII. Transferencias Internacionales", text: "¿Tiene acuerdos de procesamiento de datos (DPA)?" },
            { section: "VIII. Transferencias Internacionales", text: "¿Notifica sobre transferencias a terceros países?" },
            { section: "IX. Terceros y Proveedores", text: "¿Evalúa proveedores de seguridad y privacidad?" },
            { section: "IX. Terceros y Proveedores", text: "¿Incluye cláusulas de protección en contratos?" },
            { section: "IX. Terceros y Proveedores", text: "¿Audita proveedores regularmente?" },
            { section: "IX. Terceros y Proveedores", text: "¿Incluye cláusulas de terminación en contratos?" },
            { section: "IX. Terceros y Proveedores", text: "¿Controla subcontratistas?" },
            { section: "X. Cumplimiento y Documentación", text: "¿Mantiene Registro de Actividades de Tratamiento (RAT)?" },
            { section: "X. Cumplimiento y Documentación", text: "¿Documenta decisiones sobre privacidad?" },
            { section: "X. Cumplimiento y Documentación", text: "¿Tiene procedimientos documentados?" },
            { section: "X. Cumplimiento y Documentación", text: "¿Realiza auditorías externas periódicas?" },
            { section: "X. Cumplimiento y Documentación", text: "¿Cumple con obligaciones de retención de datos?" }
        ];

        function login() {
            const empresa = document.getElementById('empresa').value.trim();
            const email = document.getElementById('email').value.trim();
            const token = document.getElementById('token').value.trim();
            const errorDiv = document.getElementById('errorMessage');

            if (!token.startsWith('shellti-client-')) {
                errorDiv.textContent = 'Token inválido. Debe comenzar con shellti-client-';
                errorDiv.classList.add('show');
                return;
            }

            clientData = { empresa, email, token };
            allQuestions = questions.map((q, i) => ({ ...q, id: `q${i + 1}` }));

            localStorage.setItem('shellti_client', JSON.stringify(clientData));

            db.ref(`evaluaciones/${token}`).set({
                empresa, email, token,
                fechaInicio: new Date().toISOString(),
                estado: 'en_progreso'
            });

            db.ref(`evaluaciones/${token}/respuestas`).once('value').then(snapshot => {
                if (snapshot.exists()) {
                    responses = snapshot.val();
                }
                allQuestions.forEach(q => {
                    if (!responses[q.id]) {
                        const stored = localStorage.getItem(`shellti_${token}_${q.id}`);
                        if (stored) responses[q.id] = stored;
                    }
                });
                showForm();
            });
        }

        function showForm() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('questionsSection').style.display = 'block';
            currentSection = 0;
            renderSection();
        }

        function renderSection() {
            const sectionName = sections[currentSection];
            const sectionQs = allQuestions.filter(q => q.section === sectionName);

            let html = `<div class="section"><h3>${sectionName}</h3>`;
            sectionQs.forEach(q => {
                const checked = responses[q.id] || '';
                html += `
                    <div class="question-item">
                        <div class="question-text">${q.text}</div>
                        <div class="options">
                            <label class="option-label"><input type="radio" name="${q.id}" value="Sí" ${checked === 'Sí' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'Sí')"><span>Sí</span></label>
                            <label class="option-label"><input type="radio" name="${q.id}" value="Parcial" ${checked === 'Parcial' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'Parcial')"><span>Parcial</span></label>
                            <label class="option-label"><input type="radio" name="${q.id}" value="No" ${checked === 'No' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'No')"><span>No</span></label>
                            <label class="option-label"><input type="radio" name="${q.id}" value="N/A" ${checked === 'N/A' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'N/A')"><span>N/A</span></label>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            document.getElementById('questionsContainer').innerHTML = html;

            updateProgress();
            updateButtons();
        }

        function saveResponse(id, value) {
            responses[id] = value;
            updateProgress();
            localStorage.setItem(`shellti_${clientData.token}_${id}`, value);
            db.ref(`evaluaciones/${clientData.token}/respuestas/${id}`).set(value);
        }

        function updateProgress() {
            const answered = Object.keys(responses).filter(id => responses[id] && responses[id] !== 'N/A').length;
            const percent = Math.round((answered / 50) * 100);
            const angle = (percent / 100) * 360;
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressCircle').style.setProperty('--progress-angle', angle + 'deg');
            document.getElementById('currentQuestion').textContent = answered;
        }

        function updateButtons() {
            document.getElementById('prevBtn').style.display = currentSection > 0 ? 'block' : 'none';
            document.getElementById('nextBtn').style.display = currentSection < sections.length - 1 ? 'block' : 'none';
            document.getElementById('submitBtn').style.display = currentSection === sections.length - 1 ? 'block' : 'none';
        }

        function prevSection() {
            if (currentSection > 0) currentSection--;
            renderSection();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function nextSection() {
            if (currentSection < sections.length - 1) currentSection++;
            renderSection();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function submitForm() {
            const sectionScores = {};
            sections.forEach(section => {
                const sectionQs = allQuestions.filter(q => q.section === section);
                const si = sectionQs.filter(q => responses[q.id] === 'Sí').length;
                const parcial = sectionQs.filter(q => responses[q.id] === 'Parcial').length;
                const answered = sectionQs.filter(q => responses[q.id] && responses[q.id] !== 'N/A').length;
                const score = answered > 0 ? Math.round(((si * 100 + parcial * 50) / (answered * 100)) * 100) : 0;
                sectionScores[section] = score;
            });

            const overallScore = Math.round(Object.values(sectionScores).reduce((a, b) => a + b, 0) / sections.length);

            db.ref(`evaluaciones/${clientData.token}`).update({
                estado: 'completada',
                fechaCompletada: new Date().toISOString(),
                scoreGeneral: overallScore
            });

            document.getElementById('questionsContainer').style.display = 'none';
            document.querySelectorAll('.navigation')[0].style.display = 'none';

            let html = `<h3>Evaluación Completada</h3><div class="results-header"><div class="overall-score">${overallScore}%</div><div class="overall-label">Cumplimiento General</div></div><div style="margin-top: 40px;">`;

            sections.forEach(section => {
                const score = sectionScores[section];
                const risk = score >= 80 ? 'low' : score >= 60 ? 'medium' : score >= 40 ? 'high' : 'critical';
                const bgColor = risk === 'low' ? 'var(--green)' : risk === 'medium' ? '#FFC107' : risk === 'high' ? '#F59E0B' : '#FF6B6B';
                html += `<div class="domain-card"><div class="domain-header"><span class="domain-name">${section}</span><span style="color: ${bgColor}; font-weight: 700;">${score}%</span></div><div class="score-bar"><div class="score-bar-track"><div class="score-bar-fill" style="width: ${score}%; background: ${bgColor};"></div></div></div><div class="risk-badge risk-${risk}">Riesgo: ${risk.toUpperCase()}</div></div>`;
            });

            html += `</div><button class="btn" onclick="downloadPDF()" style="width: 100%; margin-top: 40px;">Descargar Informe PDF</button>`;

            document.getElementById('resultsContent').innerHTML = html;
            document.getElementById('summary').style.display = 'block';
        }

        function downloadPDF() {
            const sectionScores = {};
            sections.forEach(section => {
                const sectionQs = allQuestions.filter(q => q.section === section);
                const si = sectionQs.filter(q => responses[q.id] === 'Sí').length;
                const parcial = sectionQs.filter(q => responses[q.id] === 'Parcial').length;
                const answered = sectionQs.filter(q => responses[q.id] && responses[q.id] !== 'N/A').length;
                const score = answered > 0 ? Math.round(((si * 100 + parcial * 50) / (answered * 100)) * 100) : 0;
                sectionScores[section] = score;
            });

            const overallScore = Math.round(Object.values(sectionScores).reduce((a, b) => a + b, 0) / sections.length);

            let pdf = `<div style="font-family: Arial; color: #333; font-size: 11px; line-height: 1.6;">
                <style>@page { margin: 40px; }</style>
                <h1 style="color: #00D4FF; text-align: center; font-size: 24px; margin: 40px 0;">ShellTI - INFORME DE CUMPLIMIENTO</h1>
                <p><strong>Ley N° 21.719 - Protección de Datos Personales</strong></p>
                <p><strong>Organización:</strong> ${clientData.empresa}</p>
                <p><strong>Contacto:</strong> ${clientData.email}</p>
                <p><strong>Fecha:</strong> ${new Date().toLocaleDateString('es-CL')}</p>
                <hr style="border: 1px solid #ddd; margin: 30px 0;">
                <h2 style="color: #00D4FF; font-size: 16px;">Score General: ${overallScore}%</h2>
                <h3 style="color: #00D4FF; font-size: 14px; margin-top: 30px;">Resultados por Dominio</h3>
            `;

            sections.forEach(section => {
                const score = sectionScores[section];
                pdf += `<p><strong>${section}:</strong> ${score}%</p>`;
            });

            pdf += `</div>`;

            const element = document.createElement('div');
            element.innerHTML = pdf;

            html2pdf().set({
                margin: 10,
                filename: `ShellTI_Diagnostic_${clientData.empresa}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            }).from(element).save();
        }

        // Auto-login si hay token guardado
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('shellti_client');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('empresa').value = data.empresa;
                document.getElementById('email').value = data.email;
                document.getElementById('token').value = data.token;
                login();
            }
        });
    </script>
</body>
</html>
