            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

        }
        .site-header {
            background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            padding: 20px 0;
        }
        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .header-content h1 {
            font-size: 24px;
            color: var(--cyan);
            margin: 0;
        }
        .header-content p {
            margin: 5px 0 0 0;
            color: var(--silver);
            opacity: 0.8;
            font-size: 14px;
        }
        main {
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
        }
        .auth-section {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--cyan);
            border-radius: 12px;
            padding: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--cyan);
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--cyan);
            border-radius: 8px;
            color: var(--silver);
        }
        .form-group input::placeholder {
            color: rgba(226, 232, 240, 0.5);
        }
        .btn {
            padding: 12px 24px;
            background: var(--cyan);
            color: var(--deep);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover {
            background: var(--green);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
        }
        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
        }

            margin-bottom: 30px;
        }
        .section h3 {
            color: var(--cyan);
            margin-bottom: 20px;
            font-size: 18px;
        }

            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 8px;
        }
        .question-text {
            margin-bottom: 12px;
            font-weight: 500;
            color: var(--silver);
        }
        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-label:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.4);
        }
        .option-label input {
            margin-right: 8px;
            cursor: pointer;
        }
        .progress-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 30px;
        }
        .progress-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(var(--cyan) 0deg, var(--cyan) var(--progress-angle, 0deg), rgba(255, 255, 255, 0.1) var(--progress-angle, 0deg));

            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

            height: 90px;
            border-radius: 50%;

            flex-direction: column;
            align-items: center;
            justify-content: center;

            font-size: 24px;
            font-weight: bold;
            color: var(--cyan);
        }
        .progress-percent-label {
            font-size: 10px;
            color: var(--silver);
            opacity: 0.7;
        }
        .progress-container {
            flex: 1;
        }
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }
        .progress-text {
            font-size: 12px;
            color: var(--silver);
            opacity: 0.8;
        }
        .navigation {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            margin-top: 30px;
        }
        .nav-btn {
            flex: 1;

            background: rgba(52, 211, 153, 0.1);

            padding: 24px;
            margin-top: 30px;
            text-align: center;

            color: var(--green);

            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #FF6B6B;

            padding: 30px 20px;
            color: var(--silver);
            opacity: 0.7;
            text-align: center;
            font-size: 14px;

</head>

            pageQuestions.forEach(q => {
                if (q.section !== currentSection) {
                    currentSection = q.section;
                    html += `<div class="section"><h3>${currentSection}</h3>`;
                }

                const value = getQuestionValue(q.id);
                html += `
                    <div class="question-item">
                        <div class="question-text">${q.text} *</div>
                        <div class="options">
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="Si" ${value === 'Si' ? 'checked' : ''} required onchange="saveResponse('${q.id}', 'Si')">
                                Sí
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="Parcial" ${value === 'Parcial' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'Parcial')">
                                Parcial
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="No" ${value === 'No' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'No')">
                                No
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="NA" ${value === 'NA' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'NA')">
                                N/A
                            </label>
                        </div>
                    </div>
                `;
            });

            if (pageQuestions.length > 0) {
                html += '</div>';
            }

            container.innerHTML = html;
            updateNavigation();
            updateProgress();
        }

        function getQuestionValue(questionId) {
            return responses[questionId] || '';
        }

        function saveResponse(questionId, value) {
            responses[questionId] = value;
            updateProgress();
        }

        function updateNavigation() {
            const totalPages = Math.ceil(allQuestions.length / questionsPerPage);
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');

            prevBtn.style.display = currentPage > 0 ? 'block' : 'none';
            nextBtn.style.display = currentPage < totalPages - 1 ? 'block' : 'none';
            submitBtn.style.display = currentPage === totalPages - 1 ? 'block' : 'none';
        }

        function updateProgress() {
            const totalQuestions = allQuestions.length;
            const answeredQuestions = allQuestions.filter(q => getQuestionValue(q.id)).length;
            const percentage = Math.round((answeredQuestions / totalQuestions) * 100);
            const angleInDegrees = (percentage / 100) * 360;

            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('currentQuestion').textContent = answeredQuestions;
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('progressPercent').textContent = percentage + '%';

            // Actualizar círculo de progreso
            document.getElementById('progressCircle').style.setProperty('--progress-angle', angleInDegrees + 'deg');
        }

        function nextQuestion() {
            const totalPages = Math.ceil(allQuestions.length / questionsPerPage);
            if (currentPage < totalPages - 1) {
                currentPage++;
                renderQuestions();
                window.scrollTo(0, 0);
            }
        }

        function prevQuestion() {
            if (currentPage > 0) {
                currentPage--;
                renderQuestions();
                window.scrollTo(0, 0);
            }
        }

        function calculateScores() {
            const sections = {};
            allQuestions.forEach(q => {
                if (!sections[q.section]) {
                    sections[q.section] = { total: 0, si: 0, parcial: 0, no: 0, na: 0, score: 0 };
                }
                const answer = responses[q.id];
                if (answer !== 'N/A' && answer) {
                    sections[q.section].total++;
                    if (answer === 'Si') sections[q.section].si++;
                    else if (answer === 'Parcial') sections[q.section].parcial++;
                    else if (answer === 'No') sections[q.section].no++;
                } else if (answer === 'N/A') {
                    sections[q.section].na++;
                }
            });

            // Calcular scores: Si=100%, Parcial=50%, No=0%
            Object.keys(sections).forEach(section => {
                const s = sections[section];
                if (s.total > 0) {
                    s.score = Math.round(((s.si * 100 + s.parcial * 50) / (s.total * 100)) * 100);
                }
            });

            return sections;
        }

        function analyzeAreaDetailed(section) {
            const sectionQuestions = allQuestions.filter(q => q.section === section);
            const sectionResponses = sectionQuestions.map(q => ({
                question: q.question,
                answer: responses[q.id] || 'No respondida',
                id: q.id
            }));

            const noResponses = sectionResponses.filter(r => r.answer === 'No');
            const parcialResponses = sectionResponses.filter(r => r.answer === 'Parcial');
            const siResponses = sectionResponses.filter(r => r.answer === 'Sí');

            // Calcular score real
            const totalAnswered = sectionResponses.filter(r => r.answer !== 'N/A' && r.answer !== 'No respondida').length;
            const scoreValue = totalAnswered > 0 ? Math.round(((siResponses.length * 100 + parcialResponses.length * 50) / (totalAnswered * 100)) * 100) : 0;

            // Generar hallazgos
            let findings = [];
            if (noResponses.length > 0) {
                findings.push(`Se identificaron ${noResponses.length} control(es) sin implementación: ${noResponses.map(r => r.question).join('; ')}`);
            }
            if (parcialResponses.length > 0) {
                findings.push(`Se encontraron ${parcialResponses.length} control(es) parcialmente implementado(s) que requieren refuerzo`);
            }

            // Riesgo
            let riskLevel = 'BAJO';
            let riskDescription = 'Riesgo mínimo';
            if (scoreValue < 40) {
                riskLevel = 'CRÍTICO';
                riskDescription = 'Incumplimiento severo con exposición regulatoria y de datos significativa';
            } else if (scoreValue < 60) {
                riskLevel = 'ALTO';
                riskDescription = 'Brechas sustanciales en controles críticos';
            } else if (scoreValue < 80) {
                riskLevel = 'MEDIO';
                riskDescription = 'Mejoras necesarias para cumplimiento robusto';
            } else if (scoreValue < 100) {
                riskLevel = 'BAJO';
                riskDescription = 'Implementación sólida con mejoras menores';
            }

            return {
                section: section,
                score: scoreValue,
                totalQuestions: sectionQuestions.length,
                answered: totalAnswered,
                siCount: siResponses.length,
                parcialCount: parcialResponses.length,
                noCount: noResponses.length,
                currentState: scoreValue,
                gap: 100 - scoreValue,
                findings: findings,
                riskLevel: riskLevel,
                riskDescription: riskDescription,
                priorityRecommendations: getPriorityRecommendations(section, noResponses, scoreValue)
            };
        }

        function getPriorityRecommendations(section, failures, score) {
            const recommendations = getAreaRecommendations(score, section);
            // Retorna las primeras 3 recomendaciones más críticas
            return recommendations.slice(0, 3);
        }

            try {

        function generateRiskMatrix(sections) {
            let html = '';
            for (let section in sections) {
                const s = sections[section];
                const score = Math.round(((s.si + s.parcial*0.5) / s.total) * 100);

                let riskLevel, riskColor, impactDesc;
                if (score >= 80) {
                    riskLevel = 'BAJO';
                    riskColor = '#34D399';
                    impactDesc = 'Mínimo';
                } else if (score >= 60) {
                    riskLevel = 'MEDIO';
                    riskColor = '#FFA500';
                    impactDesc = 'Moderado';
                } else {
                    riskLevel = 'ALTO';
                    riskColor = '#FF6B6B';
                    impactDesc = 'Crítico';
                }

                html += `
                    <tr style="background: ${score < 60 ? '#fff0f0' : score < 80 ? '#fffaf0' : '#f0fdf4'};">
                        <td style="padding: 8px; border: 1px solid #ddd;">${section}</td>
                        <td style="padding: 8px; border: 1px solid #ddd; text-align: center; font-weight: bold;">${score}%</td>
                        <td style="padding: 8px; border: 1px solid #ddd; text-align: center; color: ${riskColor}; font-weight: bold;">${riskLevel}</td>
                        <td style="padding: 8px; border: 1px solid #ddd; text-align: center;">${impactDesc}</td>
                    </tr>
                `;
            }
            return html;
        }

        function generateRoadmap(sections) {
            const roadmapHTML = `
                <div style="font-size: 12px; line-height: 1.8;">
                    <div style="margin-bottom: 20px;">

        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();

            try {
                const stats = { Si: 0, Parcial: 0, No: 0, NA: 0 };

                for (let key in responses) {
                    if (responses[key]) {
                        stats[responses[key]]++;
                    }
                }

                const responseId = 'deep-' + Date.now();
                const data = {
                    responseId,
                    timestamp: new Date().toISOString(),
                    cliente: clientData,
                    respuestas: responses,
                    estadisticas: stats
                };

                console.log('Formulario completado:', data);

                const totalAnswered = Object.keys(responses).length;
                const overallScore = Math.round((totalAnswered / 50) * 100);

                let reportHTML = `
                    <div style="padding: 40px 20px; text-align: center;">
                        <h1 style="color: var(--cyan); margin-bottom: 20px;">Evaluación Completada</h1>
                        <p style="color: var(--green); font-size: 36px; font-weight: bold; margin: 30px 0;">${overallScore}%</p>
                        <p style="color: var(--silver); margin-bottom: 40px;">Preguntas respondidas: ${totalAnswered}/50</p>
                        <p style="color: var(--silver); margin-bottom: 40px; line-height: 1.6;">
                            El informe profesional con análisis detallado por área, brecha de cumplimiento,
                            recomendaciones específicas y mapeo a Ley 21.719 e ISO 27001:2022 se genera en PDF.
                        </p>
                        <button class="btn" onclick="downloadPDF()" style="width: 100%; padding: 15px; font-size: 16px;">📥 Descargar Informe Completo (PDF)</button>
                    </div>
                `;

                document.querySelector('.container').innerHTML = reportHTML;
            } catch (error) {
                console.error('Error:', error);
                showError('Error al procesar: ' + error.message);
            }
        });
    </script>
