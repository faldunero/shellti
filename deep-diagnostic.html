<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Diagnostic - Ley N° 21.719</title>
    <style>
        :root {
            --cyan: #00D4FF;
            --green: #34D399;
            --deep: #020617;
            --silver: #E2E8F0;
            --muted: #94A3B8;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--deep) 0%, #1a2332 100%);
            color: var(--silver);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER */
        .site-header {
            background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header-logo {
            height: 40px;
            width: 40px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.5));
        }
        .header-brand {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .header-brand-name {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--silver);
            letter-spacing: -0.5px;
        }
        .header-brand-name span {
            color: var(--cyan);
        }
        .header-brand-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            letter-spacing: 1.5px;
            color: var(--muted);
            text-transform: uppercase;
        }

        main {
            flex: 1;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 40px;
        }

        /* FORM STYLING - NO BORDERS */
        .auth-section {
            background: rgba(0, 212, 255, 0.03);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--cyan);
            font-size: 13px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 4px;
            color: var(--silver);
            font-size: 13px;
        }
        .form-group input::placeholder {
            color: rgba(226, 232, 240, 0.4);
        }
        .form-group input:focus {
            outline: none;
            background: rgba(0, 212, 255, 0.08);
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--cyan), var(--cyan2, var(--cyan)));
            color: var(--deep);
            border: none;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 212, 255, 0.25);
        }
        .btn-secondary {
            background: transparent;
            color: var(--cyan);
            padding: 10px 20px;
        }
        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.08);
        }

        .section {
            margin-bottom: 30px;
        }
        .section h3 {
            color: var(--cyan);
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 700;
        }
        .question-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 6px;
        }
        .question-text {
            margin-bottom: 12px;
            font-weight: 500;
            color: var(--silver);
            font-size: 13px;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 12px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }
        .option-label:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        .option-label input {
            margin-right: 6px;
            cursor: pointer;
        }

        .progress-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 30px;
        }
        .progress-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(var(--cyan) 0deg, var(--cyan) var(--progress-angle, 0deg), rgba(255, 255, 255, 0.1) var(--progress-angle, 0deg));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .progress-circle-inner {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .progress-percent {
            font-size: 24px;
            font-weight: bold;
            color: var(--cyan);
        }
        .progress-percent-label {
            font-size: 10px;
            color: var(--silver);
            opacity: 0.7;
        }
        .progress-container {
            flex: 1;
        }
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }
        .progress-text {
            font-size: 12px;
            color: var(--muted);
        }

        .navigation {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }
        .nav-btn {
            padding: 10px 20px;
            font-size: 12px;
        }

        .summary {
            margin-top: 40px;
        }
        .summary h3 {
            color: var(--cyan);
            margin-bottom: 30px;
            font-size: 18px;
            text-align: center;
        }

        /* RESULTS STYLING */
        .results-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .overall-score {
            font-size: 48px;
            font-weight: 900;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -1px;
        }
        .overall-label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 8px;
        }

        .analysis-section {
            margin-bottom: 40px;
        }
        .analysis-title {
            color: var(--green);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(52, 211, 153, 0.2);
        }

        .domain-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 6px;
        }
        .domain-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .domain-name {
            font-weight: 600;
            color: var(--silver);
            font-size: 13px;
        }
        .domain-score {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 13px;
        }
        .score-ok { color: var(--green); }
        .score-warn { color: #F59E0B; }
        .score-danger { color: #FF6B6B; }

        .semaforo {
            display: flex;
            gap: 4px;
            margin-left: 12px;
        }
        .semaforo-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .semaforo-ok { background: var(--green); }
        .semaforo-warn { background: #F59E0B; }
        .semaforo-danger { background: #FF6B6B; }

        .score-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .score-bar-track {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--cyan));
            border-radius: 3px;
        }
        .score-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            min-width: 30px;
            text-align: right;
        }

        .findings-list {
            font-size: 12px;
            color: var(--muted);
            margin-top: 12px;
        }
        .findings-item {
            margin: 6px 0;
            padding-left: 12px;
            text-align: justify;
        }
        .findings-item::before {
            content: "→ ";
            color: var(--cyan);
            margin-right: 4px;
        }

        .risk-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }
        .risk-critical {
            background: rgba(255, 107, 107, 0.2);
            color: #FF6B6B;
        }
        .risk-high {
            background: rgba(255, 165, 0, 0.2);
            color: #F59E0B;
        }
        .risk-medium {
            background: rgba(255, 193, 7, 0.2);
            color: #FFC107;
        }
        .risk-low {
            background: rgba(52, 211, 153, 0.2);
            color: var(--green);
        }

        /* FOOTER */
        footer {
            background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            margin-top: auto;
            font-size: 11px;
            color: var(--muted);
        }
        .footer-logo img {
            height: 32px;
            width: 32px;
            object-fit: contain;
            filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.4));
        }
        .footer-logo a span {
            font-weight: 700;
            color: var(--silver);
        }
        footer p {
            margin: 4px 0;
        }

        .error {
            background: rgba(255, 107, 107, 0.1);
            color: #FF6B6B;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 12px;
            text-align: justify;
            display: none;
        }
        .error.show {
            display: block;
        }
    </style>
</head>

                </form>

                <div class="summary" id="summary" style="display:none;">
                    <h3>Evaluación Completada</h3>
                    <div id="resultsContent" style="margin-top: 30px; text-align: left;"></div>
                    <button class="btn" onclick="downloadPDF()" style="width: 100%; margin-top: 40px;">Descargar Informe PDF Completo</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGn_dUYJI8WiQ6QfaTBGHOgr6FDHIbiI0",

        const questions = [

        async function authenticate() {
            const empresa = document.getElementById('empresa').value.trim();
            const email = document.getElementById('email').value.trim();
            const token = document.getElementById('token').value.trim();
            const errorDiv = document.getElementById('errorMessage');

            if (!empresa || !email || !token) {
                errorDiv.textContent = 'Por favor completa todos los campos';
                errorDiv.classList.add('show');
                return;
            }

            if (!token.startsWith('shellti-client-')) {
                errorDiv.textContent = 'Token inválido. Debe comenzar con shellti-client-';
                errorDiv.classList.add('show');
                return;
            }

            clientData = { empresa, email, token };
            allQuestions = questions.map((q, i) => ({ ...q, id: `q${i + 1}` }));
            document.getElementById('totalQuestions').textContent = allQuestions.length;

            // Guardar/actualizar datos de la evaluación en Firebase
            const evaluacionRef = db.ref(`evaluaciones/${token}`);
            evaluacionRef.set({
                empresa,
                email,
                token,
                fechaInicio: new Date().toISOString(),
                estado: 'en_progreso'
            }, (error) => {
                if (error) console.log('Error guardando evaluación:', error.message);
            });

            // Recuperar respuestas previas: Firebase primero, luego localStorage
            let responsesFromFirebase = false;
            try {
                const snapshot = await db.ref(`evaluaciones/${token}/respuestas`).once('value');
                if (snapshot.exists()) {
                    responses = snapshot.val();
                    responsesFromFirebase = true;
                    console.log('Respuestas recuperadas de Firebase:', responses);
                }
            } catch (e) {
                console.warn('No se pudieron recuperar de Firebase:', e.message);
            }

            // Si Firebase no tiene respuestas, recuperar de localStorage
            if (!responsesFromFirebase) {
                allQuestions.forEach(q => {
                    const stored = localStorage.getItem(`shellti_${token}_${q.id}`);
                    if (stored) responses[q.id] = stored;
                });
                if (Object.keys(responses).length > 0) {
                    console.log('Respuestas recuperadas de localStorage:', responses);
                }
            }

            document.getElementById('authSection').style.display = 'none';
            document.getElementById('questionsSection').style.display = 'block';
            errorDiv.classList.remove('show');

            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            const start = currentPage * questionsPerPage;
            const end = Math.min(start + questionsPerPage, allQuestions.length);
            const pageQuestions = allQuestions.slice(start, end);

            pageQuestions.forEach((q, idx) => {
                const section = idx === 0 ? `<h3 class="section">${q.section}</h3>` : '';
                const html = `
                    ${section}
                    <div class="question-item">
                        <div class="question-text">${q.text}</div>
                        <div class="options">
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="Sí" ${responses[q.id] === 'Sí' ? 'checked' : ''} onchange="saveResponse('${q.id}', this.value)">
                                <span>Sí</span>
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="Parcial" ${responses[q.id] === 'Parcial' ? 'checked' : ''} onchange="saveResponse('${q.id}', this.value)">
                                <span>Parcial</span>
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="No" ${responses[q.id] === 'No' ? 'checked' : ''} onchange="saveResponse('${q.id}', this.value)">
                                <span>No</span>
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="N/A" ${responses[q.id] === 'N/A' ? 'checked' : ''} onchange="saveResponse('${q.id}', this.value)">
                                <span>N/A</span>
                            </label>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });

            updateProgress();
            updateButtons();
        }

        function saveResponse(questionId, value) {
            responses[questionId] = value;
            updateProgress();

            // Guardar en localStorage como fallback
            localStorage.setItem(`shellti_${clientData.token}_${questionId}`, value);

            // Guardar en Firebase (no-blocking)
            if (clientData.token) {
                db.ref(`evaluaciones/${clientData.token}/respuestas/${questionId}`).set(value)
                    .catch(e => console.error('Firebase error:', e.message));
            }
        }

        function updateProgress() {
            const answered = Object.keys(responses).filter(id => responses[id] && responses[id] !== 'N/A').length;
            const percent = Math.round((answered / allQuestions.length) * 100);
            const angle = (percent / 100) * 360;

            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressCircle').style.setProperty('--progress-angle', angle + 'deg');
            document.getElementById('currentQuestion').textContent = answered;
        }

        function updateButtons() {
            const maxPage = Math.ceil(allQuestions.length / questionsPerPage) - 1;
            console.log('updateButtons: currentPage=', currentPage, 'maxPage=', maxPage, 'allQuestions.length=', allQuestions.length);

            document.getElementById('prevBtn').style.display = currentPage > 0 ? 'block' : 'none';
            document.getElementById('nextBtn').style.display = currentPage < maxPage ? 'block' : 'none';
            document.getElementById('submitBtn').style.display = currentPage === maxPage ? 'block' : 'none';

            console.log('nextBtn display:', document.getElementById('nextBtn').style.display);
        }

        function prevQuestion() {
            if (currentPage > 0) currentPage--;
            renderQuestions();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextQuestion() {
            console.log('nextQuestion called. currentPage:', currentPage);
            const start = currentPage * questionsPerPage;
            const end = Math.min(start + questionsPerPage, allQuestions.length);

            for (let i = start; i < end; i++) {
                const checked = document.querySelector(`input[name="q${i + 1}"]:checked`);
                if (checked) responses[`q${i + 1}`] = checked.value;
            }

            const maxPage = Math.ceil(allQuestions.length / questionsPerPage) - 1;
            console.log('maxPage:', maxPage, 'currentPage:', currentPage);

            if (currentPage < maxPage) {
                currentPage++;
                console.log('Moving to page:', currentPage);
                renderQuestions();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                console.log('Ya estás en la última página');
            }
        }

        function saveBatch() {
            if (clientData.token) {
                const updates = {};
                for (const [qId, value] of Object.entries(responses)) {
                    updates[`evaluaciones/${clientData.token}/respuestas/${qId}`] = value;
                }
                db.ref().update(updates).catch(e => console.log('Error guardando batch:', e.message));
            }
        }

        document.getElementById('form').addEventListener('submit', async function(e) {
            e.preventDefault();

            try {
                const start = currentPage * questionsPerPage;
                const end = Math.min(start + questionsPerPage, allQuestions.length);
                for (let i = start; i < end; i++) {
                    const checked = document.querySelector(`input[name="q${i + 1}"]:checked`);
                    if (checked) responses[`q${i + 1}`] = checked.value;
                }

                const sections = calculateScores();
                const scores = Object.values(sections).map(s => s.score);
                const overallScore = scores.length > 0 ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;

                // Guardar evaluación como completada en Firebase
                if (clientData.token) {
                    db.ref(`evaluaciones/${clientData.token}`).update({
                        estado: 'completada',
                        fechaCompletada: new Date().toISOString(),
                        scoreGeneral: overallScore
                    }).catch(e => console.error('Error Firebase:', e.message));
                }

                document.getElementById('questionsSection').style.display = 'none';
                document.getElementById('summary').style.display = 'block';
            } catch (err) {
                console.error('Error en submit:', err);
                alert('Error: ' + err.message);
            }

            let resultsHTML = `
                <div class="results-header">
                    <div class="overall-score">${overallScore}%</div>
                    <div class="overall-label">Cumplimiento General</div>
                </div>

                <div class="analysis-section">
                    <div class="analysis-title">Resultados por Dominio</div>
            `;

            for (const [section, data] of Object.entries(sections)) {
                const riskClass = data.score >= 80 ? 'risk-low' : data.score >= 60 ? 'risk-medium' : data.score >= 40 ? 'risk-high' : 'risk-critical';
                const semaforoClass = data.score >= 80 ? 'semaforo-ok' : data.score >= 60 ? 'semaforo-warn' : 'semaforo-danger';
                const bgColor = semaforoClass === 'semaforo-ok' ? 'var(--green)' : semaforoClass === 'semaforo-warn' ? '#F59E0B' : '#FF6B6B';

                resultsHTML += `
                    <div class="domain-card">
                        <div class="domain-header">
                            <span class="domain-name">${section}</span>
                            <div style="display: flex; align-items: center;">
                                <span class="domain-score score-${semaforoClass === 'semaforo-ok' ? 'ok' : semaforoClass === 'semaforo-warn' ? 'warn' : 'danger'}">${data.score}%</span>
                                <div class="semaforo">
                                    <div class="semaforo-dot ${semaforoClass}"></div>
                                </div>
                            </div>
                        </div>
                        <div class="score-bar">
                            <div class="score-bar-track">
                                <div class="score-bar-fill" style="width: ${data.score}%; background: ${bgColor};"></div>
                            </div>
                            <div class="score-value">${data.score}%</div>
                        </div>
                        ${data.findings.length > 0 ? `<div class="findings-list">${data.findings.map(f => `<div class="findings-item">${f}</div>`).join('')}</div>` : ''}
                        <div class="risk-badge ${riskClass}">Riesgo: ${data.riskLevel}</div>
                    </div>
                `;
            }

            resultsHTML += `
                </div>
                <p style="font-size: 12px; color: var(--muted); margin-top: 30px; text-align: justify;">
                    Descarga el informe PDF para análisis técnico detallado por dominio, mappeo a Ley 21.719 e ISO 27001:2022,
                    matriz de riesgos y roadmap de implementación de 12 meses.
                </p>
            `;

            const resultsDiv = document.getElementById('resultsContent');
            if (resultsDiv) {
                resultsDiv.innerHTML = resultsHTML;
            } else {
                console.error('No se encontró resultsContent');
            }
        });

        function calculateScores() {
            const sections = {};

            allQuestions.forEach((q, idx) => {
                const sectionName = q.section;
                if (!sections[sectionName]) sections[sectionName] = [];
                sections[sectionName].push({ id: q.id, question: q.text, answer: responses[q.id] || 'No respondida' });
            });

            const result = {};
            for (const [section, sectionResponses] of Object.entries(sections)) {
                const siResponses = sectionResponses.filter(r => r.answer === 'Sí');
                const parcialResponses = sectionResponses.filter(r => r.answer === 'Parcial');
                const noResponses = sectionResponses.filter(r => r.answer === 'No');

                const totalAnswered = sectionResponses.filter(r => r.answer !== 'N/A' && r.answer !== 'No respondida').length;
                const scoreValue = totalAnswered > 0 ? Math.round(((siResponses.length * 100 + parcialResponses.length * 50) / (totalAnswered * 100)) * 100) : 0;

                let findings = [];
                if (noResponses.length > 0) {
                    findings.push(`${noResponses.length} control(es) sin implementación`);
                }
                if (parcialResponses.length > 0) {
                    findings.push(`${parcialResponses.length} control(es) parcialmente implementado(s)`);
                }

                let riskLevel = 'BAJO';
                if (scoreValue < 40) riskLevel = 'CRÍTICO';
                else if (scoreValue < 60) riskLevel = 'ALTO';
                else if (scoreValue < 80) riskLevel = 'MEDIO';

                result[section] = {
                    score: scoreValue,
                    findings: findings,
                    riskLevel: riskLevel
                };
            }

            return result;
        }

        async function downloadPDF() {
            const btn = event.target;

            btn.textContent = 'Generando PDF...';

            const sections = calculateScores();
            const scores = Object.values(sections).map(s => s.score);
            const overallScore = scores.length > 0 ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;

            let pdfHTML = `
                <div style="font-family: 'Plus Jakarta Sans', Arial, sans-serif; color: #333; line-height: 1.6; font-size: 11px;">
                    <style>
                        @page { margin: 40px 40px 60px; }
                        body { margin: 0; padding: 0; }
                        h1, h2, h3 { color: #00D4FF; margin: 20px 0 10px; }
                        p { margin: 8px 0; text-align: justify; }
                        .page-break { page-break-after: always; }
                    </style>

                    <!-- PORTADA -->
                    <div class="page-break" style="padding: 80px 40px; background: #020617; color: white; text-align: center;">
                        <div style="font-size: 36px; font-weight: bold; color: #00D4FF; margin-bottom: 40px;">ShellTI</div>
                        <h1 style="color: white; font-size: 28px; margin: 40px 0; line-height: 1.4;">INFORME DE EVALUACIÓN DE CUMPLIMIENTO NORMATIVO</h1>
                        <p style="font-size: 12px; color: #E2E8F0; margin: 30px 0;">Ley Nº 21.719 — ISO/IEC 27001:2022</p>
                        <div style="border-top: 1px solid #00D4FF; border-bottom: 1px solid #00D4FF; padding: 30px 0; margin: 60px 0; font-size: 11px; line-height: 1.8;">
                            <div><strong>ORGANIZACIÓN:</strong> ${clientData.empresa || 'Por determinar'}</div>
                            <div><strong>CONTACTO:</strong> ${clientData.email || 'Por determinar'}</div>
                            <div><strong>FECHA:</strong> ${new Date().toLocaleDateString('es-CL', {year: 'numeric', month: 'long', day: 'numeric'})}</div>
                            <div><strong>CONTROLES EVALUADOS:</strong> 50 áreas en 10 dominios</div>
                        </div>
                        <p style="font-size: 10px; color: #E2E8F0; opacity: 0.7; margin-top: 60px;">Documento Confidencial | ShellTI Technology Consultancy</p>
                    </div>

                    <!-- RESUMEN EJECUTIVO -->
                    <h2>1. Resumen Ejecutivo</h2>
                    <p><strong>Score General de Cumplimiento:</strong> ${overallScore}%</p>
                    <p>La evaluación diagnostica el estado actual de cumplimiento normativo conforme a la Ley N° 21.719 de Protección de Datos Personales e ISO/IEC 27001:2022. Este informe proporciona análisis técnico por dominio, identificación de brechas críticas y roadmap de implementación.</p>

                    <!-- RESULTADOS POR DOMINIO -->
                    <h2>2. Resultados por Dominio</h2>
            `;

            for (const [section, data] of Object.entries(sections)) {
                pdfHTML += `
                    <h3>${section} — ${data.score}%</h3>
                    <p><strong>Estado de Riesgo:</strong> ${data.riskLevel}</p>
                    ${data.findings.length > 0 ? `<p><strong>Hallazgos:</strong> ${data.findings.join('; ')}</p>` : ''}
                `;
            }

            pdfHTML += `</div>`;

            const element = document.createElement('div');
            element.innerHTML = pdfHTML;

            const opt = {
                margin: 10,
                filename: `ShellTI_Diagnostic_${clientData.empresa}_${new Date().getTime()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, logging: false },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };

            html2pdf().set(opt).from(element).save();

            btn.disabled = false;
            btn.textContent = 'Descargar Informe PDF Completo';
        }
    </script>
