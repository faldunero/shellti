    <title>Deep Diagnostic - Ley N° 21.719</title>

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

            min-height: 100vh;
        }
        .site-header {
            background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            padding: 20px 0;
        }
        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .header-content h1 {
            font-size: 24px;
            color: var(--cyan);
            margin: 0;
        }
        .header-content p {
            margin: 5px 0 0 0;
            color: var(--silver);
            opacity: 0.8;
            font-size: 14px;
        }
        main {
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
        }
        .auth-section {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--cyan);
            border-radius: 12px;
            padding: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--cyan);
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--cyan);
            border-radius: 8px;
            color: var(--silver);
        }
        .form-group input::placeholder {
            color: rgba(226, 232, 240, 0.5);
        }
        .btn {
            padding: 12px 24px;
            background: var(--cyan);
            color: var(--deep);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover {
            background: var(--green);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
        }
        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        .section {
            margin-bottom: 30px;
        }
        .section h3 {
            color: var(--cyan);
            margin-bottom: 20px;
            font-size: 18px;
        }
        .question-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 8px;
        }
        .question-text {
            margin-bottom: 12px;
            font-weight: 500;
            color: var(--silver);
        }
        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-label:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.4);
        }
        .option-label input {
            margin-right: 8px;
            cursor: pointer;
        }
        .progress-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 30px;
        }
        .progress-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(var(--cyan) 0deg, var(--cyan) var(--progress-angle, 0deg), rgba(255, 255, 255, 0.1) var(--progress-angle, 0deg));

            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);

            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

            font-size: 24px;
            font-weight: bold;
            color: var(--cyan);
        }
        .progress-percent-label {
            font-size: 10px;
            color: var(--silver);
            opacity: 0.7;
        }
        .progress-container {
            flex: 1;
        }
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }
        .progress-text {
            font-size: 12px;
            color: var(--silver);
            opacity: 0.8;
        }
        .navigation {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            margin-top: 30px;
        }
        .nav-btn {
            flex: 1;

            background: rgba(52, 211, 153, 0.1);

            border-radius: 12px;
            padding: 24px;
            margin-top: 30px;
            text-align: center;

            color: var(--green);
            margin-bottom: 10px;

            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #FF6B6B;
            color: #FF6B6B;
            padding: 12px;

            margin-bottom: 16px;
            display: none;

            background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            padding: 30px 20px;
            color: var(--silver);
            opacity: 0.7;
            text-align: center;
            font-size: 14px;

</head>

                html += `
                    <div class="question-item">
                        <div class="question-text">${q.text} *</div>
                        <div class="options">
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="Si" ${value === 'Si' ? 'checked' : ''} required onchange="saveResponse('${q.id}', 'Si')">
                                Sí
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="Parcial" ${value === 'Parcial' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'Parcial')">
                                Parcial
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="No" ${value === 'No' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'No')">
                                No
                            </label>
                            <label class="option-label">
                                <input type="radio" name="${q.id}" value="NA" ${value === 'NA' ? 'checked' : ''} onchange="saveResponse('${q.id}', 'NA')">
                                N/A
                            </label>
                        </div>
                    </div>
                `;
            });

            if (pageQuestions.length > 0) {
                html += '</div>';
            }

            container.innerHTML = html;
            updateNavigation();
            updateProgress();
        }

        function getQuestionValue(questionId) {
            return responses[questionId] || '';
        }

        function saveResponse(questionId, value) {
            responses[questionId] = value;
            updateProgress();
        }

        function updateNavigation() {
            const totalPages = Math.ceil(allQuestions.length / questionsPerPage);
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');

            prevBtn.style.display = currentPage > 0 ? 'block' : 'none';
            nextBtn.style.display = currentPage < totalPages - 1 ? 'block' : 'none';
            submitBtn.style.display = currentPage === totalPages - 1 ? 'block' : 'none';
        }

        function updateProgress() {
            const totalQuestions = allQuestions.length;
            const answeredQuestions = allQuestions.filter(q => getQuestionValue(q.id)).length;
            const percentage = Math.round((answeredQuestions / totalQuestions) * 100);
            const angleInDegrees = (percentage / 100) * 360;

            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('currentQuestion').textContent = answeredQuestions;
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('progressPercent').textContent = percentage + '%';

            // Actualizar círculo de progreso
            document.getElementById('progressCircle').style.setProperty('--progress-angle', angleInDegrees + 'deg');
        }

        function nextQuestion() {
            const totalPages = Math.ceil(allQuestions.length / questionsPerPage);
            if (currentPage < totalPages - 1) {
                currentPage++;
                renderQuestions();
                window.scrollTo(0, 0);
            }
        }

        function prevQuestion() {
            if (currentPage > 0) {
                currentPage--;
                renderQuestions();
                window.scrollTo(0, 0);
            }
        }

        function calculateScores() {
            const sections = {};
            allQuestions.forEach(q => {
                if (!sections[q.section]) {
                    sections[q.section] = { total: 0, si: 0, parcial: 0, no: 0 };
                }
                sections[q.section].total++;
                const answer = responses[q.id];
                if (answer === 'Si') sections[q.section].si++;
                else if (answer === 'Parcial') sections[q.section].parcial++;
                else if (answer === 'No') sections[q.section].no++;
            });
            return sections;
        }

        function generateResultsHTML() {
            const sections = calculateScores();
            let html = '<div style="background: rgba(0,212,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 30px;">';

            const totalAnswered = Object.keys(responses).length;
            const overallScore = Math.round((totalAnswered / allQuestions.length) * 100);

            html += `<h2 style="color: var(--cyan); margin-bottom: 20px;">Score General: ${overallScore}%</h2>`;
            html += `<p style="color: var(--silver); margin-bottom: 30px;">Preguntas respondidas: ${totalAnswered}/${allQuestions.length}</p>`;

            html += '<h3 style="color: var(--green); margin-top: 30px; margin-bottom: 15px;">Análisis por Sección:</h3>';

            for (let section in sections) {
                const s = sections[section];
                const sectionScore = Math.round(((s.si + s.parcial*0.5) / s.total) * 100);
                html += `
                    <div style="background: rgba(255,255,255,0.02); padding: 15px; margin-bottom: 12px; border-radius: 8px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <strong>${section}</strong>
                            <span style="color: var(--cyan); font-weight: bold;">${sectionScore}%</span>
                        </div>
                        <div style="height: 6px; background: rgba(0,212,255,0.1); border-radius: 3px;">
                            <div style="height: 100%; background: linear-gradient(90deg, var(--cyan), var(--green)); width: ${sectionScore}%; border-radius: 3px;"></div>
                        </div>
                        <small style="color: var(--silver); opacity: 0.7; margin-top: 8px; display: block;">✓ ${s.si} | ⊘ ${s.parcial} | ✗ ${s.no}</small>
                    </div>
                `;
            }

            html += '</div>';
            return html;
        }

        function downloadPDF() {
            const sections = calculateScores();
            const totalAnswered = Object.keys(responses).length;
            const overallScore = Math.round((totalAnswered / allQuestions.length) * 100);

            let content = `INFORME DE EVALUACIÓN - LEY 21.719\n\n`;
            content += `Empresa: ${clientData.empresa || 'N/A'}\n`;
            content += `Email: ${clientData.email || 'N/A'}\n`;
            content += `Fecha: ${new Date().toLocaleDateString('es-CL')}\n\n`;
            content += `SCORE GENERAL: ${overallScore}%\n`;
            content += `Preguntas respondidas: ${totalAnswered}/${allQuestions.length}\n\n`;

            content += `ANÁLISIS POR SECCIÓN:\n`;
            content += `${'='.repeat(50)}\n\n`;

            for (let section in sections) {
                const s = sections[section];
                const sectionScore = Math.round(((s.si + s.parcial*0.5) / s.total) * 100);
                content += `${section}: ${sectionScore}%\n`;
                content += `  ✓ Sí: ${s.si} | ⊘ Parcial: ${s.parcial} | ✗ No: ${s.no}\n\n`;
            }

            const filename = `Informe_Diagnostico_${clientData.empresa}_${new Date().getTime()}.txt`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
        }

        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();

            try {
                const stats = { Si: 0, Parcial: 0, No: 0, NA: 0 };

                for (let key in responses) {
                    if (responses[key]) {
                        stats[responses[key]]++;
                    }
                }

                const responseId = 'deep-' + Date.now();
                const data = {
                    responseId,
                    timestamp: new Date().toISOString(),
                    cliente: clientData,
                    respuestas: responses,
                    estadisticas: stats
                };

                console.log('Formulario completado:', data);

                // Mostrar resumen con análisis
                document.getElementById('resultsContent').innerHTML = generateResultsHTML();
                document.getElementById('questionsSection').style.display = 'none';
                document.getElementById('summary').style.display = 'block';

                window.scrollTo(0, 0);
            } catch (error) {
                console.error('Error:', error);
                showError('Error al procesar: ' + error.message);
            }
        });
    </script>
</body>
</html>
